/* ══════════════════════════════════════════════
   PAKET GÖNDERME EKRANI
══════════════════════════════════════════════ */
function PaketGonder({user,onClose}){
  const[step,setStep]=useState(1); // 1: Adres+Ağırlık  2: Ödeme
  const[farkliAdres,setFarkliAdres]=useState(false);
  const[form,setForm]=useState({
    gonAd:user?user.name.split(" ")[0]||"":"",
    gonSoyad:user?user.name.split(" ")[1]||"":"",
    gonTel:user?user.tel||"":"",
    gonAdres:user?user.adres||"":"",
    alAd:"",alSoyad:"",alTel:"",alAdres:"",
    agirlik:"",en:"",boy:"",yukseklik:"",aciklama:"",
    odemeYontemi:"kart",kartNo:"",kartAd:"",sson:"",cvv:"",kartKaydet:false,
  });
  const[err,setErr]=useState({});
  const[done,setDone]=useState(false);
  const[mesafeHesap,setMesafeHesap]=useState({km:0,sure:"",yukleniyor:false,hata:""});
  const set=k=>e=>setForm(f=>({...f,[k]:typeof e==="object"&&e.target?e.target.value:e}));
  const setCheck=k=>e=>setForm(f=>({...f,[k]:e.target.checked}));

  const kg=parseFloat(form.agirlik)||0;
  const desi=(parseFloat(form.en)||0)*(parseFloat(form.boy)||0)*(parseFloat(form.yukseklik)||0)/3000;
  const efKg=kg>20&&desi>0?Math.max(kg,desi):kg;
  const mesafe=mesafeHesap.km||0;
  const mesafeM=mesafe*1000;

  // Araç tipi belirle (ağırlığa göre)
  const aracTipi=(()=>{
    if(efKg<=0)return null;
    if(efKg<=15)return "motorsiklet";
    if(efKg<=250)return "otomobil";
    if(efKg<=3000)return "kamyonet";
    return "kamyon";
  })();

  const aracLabel=(()=>{
    if(aracTipi==="motorsiklet")return "🛵 Motorsiklet";
    if(aracTipi==="otomobil")return "🚗 Otomobil";
    if(aracTipi==="kamyonet")return "🚐 Kamyonet";
    if(aracTipi==="kamyon")return "🚛 Kamyon / TIR";
    return "—";
  })();

  // Fiyat hesapla (araç tipine göre)
  const fiyatHesapla=(tip,km,mM)=>{
    if(!tip||km<=0)return 0;
    if(tip==="motorsiklet"){
      if(km<1)return 90; // 1km altı sabit
      const birim=Math.ceil(mM/100);
      return 70+birim*2;
    }
    if(tip==="otomobil"){
      const birim=Math.ceil(mM/100);
      return 90+birim*5;
    }
    if(tip==="kamyonet"){
      const sinir=10;
      if(km<=sinir){const birim=Math.ceil(mM/100);return 750+birim*22;}
      return 750+Math.ceil(km)*23;
    }
    if(tip==="kamyon"){
      const sinir=10;
      if(km<=sinir){const birim=Math.ceil(mM/100);return 1500+birim*35;}
      return 1500+Math.ceil(km)*45;
    }
    return 0;
  };

  const fiyat=efKg>0&&mesafe>0?fiyatHesapla(aracTipi,mesafe,mesafeM):0;
  const komisyon=Math.ceil(fiyat*0.30);
  const kuryeKazanc=fiyat-komisyon;

  // Fiyat detay bilgileri
  const fiyatDetay=(()=>{
    if(!aracTipi||mesafe<=0)return null;
    if(aracTipi==="motorsiklet"){
      if(mesafe<1)return{acilis:0,mesafeUcret:0,sabit:90,birimSayisi:0,perBirim:0};
      const birim=Math.ceil(mesafeM/100);
      return{acilis:70,mesafeUcret:birim*2,sabit:0,birimSayisi:birim,perBirim:2};
    }
    if(aracTipi==="otomobil"){
      const birim=Math.ceil(mesafeM/100);
      return{acilis:90,mesafeUcret:birim*5,sabit:0,birimSayisi:birim,perBirim:5};
    }
    if(aracTipi==="kamyonet"){
      if(mesafe<=10){const birim=Math.ceil(mesafeM/100);return{acilis:750,mesafeUcret:birim*22,sabit:0,birimSayisi:birim,perBirim:22,uzun:false};}
      return{acilis:750,mesafeUcret:Math.ceil(mesafe)*23,sabit:0,birimSayisi:Math.ceil(mesafe),perBirim:23,uzun:true};
    }
    if(aracTipi==="kamyon"){
      if(mesafe<=10){const birim=Math.ceil(mesafeM/100);return{acilis:1500,mesafeUcret:birim*35,sabit:0,birimSayisi:birim,perBirim:35,uzun:false};}
      return{acilis:1500,mesafeUcret:Math.ceil(mesafe)*45,sabit:0,birimSayisi:Math.ceil(mesafe),perBirim:45,uzun:true};
    }
    return null;
  })();

  const mesafeHesapla=()=>{
    const gonAdres=farkliAdres?form.gonAdres:(user&&user.adres?user.adres:form.gonAdres);
    const alAdres=form.alAdres;
    if(!gonAdres||!alAdres||alAdres.length<5)return;
    setMesafeHesap(m=>({...m,yukleniyor:true,hata:""}));
    const timeout=setTimeout(()=>{
      setMesafeHesap({km:0,sure:"",yukleniyor:false,hata:"Bağlantı zaman aşımı. Lütfen tekrar deneyin."});
    },10000);
    try{
      // Önce adresleri koordinata çevir (Geocoding), sonra mesafeyi hesapla
      const geocoder=new google.maps.Geocoder();
      const geocode=(adres)=>new Promise((resolve,reject)=>{
        geocoder.geocode({address:adres+", Türkiye"},(results,status)=>{
          if(status==="OK"&&results[0]){
            resolve(results[0].geometry.location);
          }else{
            reject(new Error("Adres bulunamadı: "+adres));
          }
        });
      });

      Promise.all([geocode(gonAdres),geocode(alAdres)]).then(([gonLoc,alLoc])=>{
        // İki nokta arası kuş uçuşu mesafeyi hesapla, sonra 1.3 çarpanıyla yol mesafesine çevir
        const R=6371;
        const dLat=(alLoc.lat()-gonLoc.lat())*Math.PI/180;
        const dLon=(alLoc.lng()-gonLoc.lng())*Math.PI/180;
        const a=Math.sin(dLat/2)*Math.sin(dLat/2)+
          Math.cos(gonLoc.lat()*Math.PI/180)*Math.cos(alLoc.lat()*Math.PI/180)*
          Math.sin(dLon/2)*Math.sin(dLon/2);
        const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        const kusUcusu=R*c;
        // Kuş uçuşu 0.5 km altındaysa aynı bölge say - minimum 0 km
        const yolHam=kusUcusu<0.5?0:Math.ceil(kusUcusu*1.35);
        const sureDk=yolHam>0?Math.ceil(yolHam*2.5):0;
        const sureText=sureDk>=60?Math.floor(sureDk/60)+"sa "+(sureDk%60)+"dk":sureDk>0?sureDk+" dk":"—";
        clearTimeout(timeout);
        const kmSayi=Number(yolHam)||0;
        setMesafeHesap({km:kmSayi,sure:sureText,yukleniyor:false,hata:""});
      }).catch(e=>{
        clearTimeout(timeout);
        setMesafeHesap({km:0,sure:"",yukleniyor:false,hata:"Adres bulunamadı. Örnek: Kadıköy, İstanbul"});
      });
    }catch(e){
      clearTimeout(timeout);
      setMesafeHesap({km:0,sure:"",yukleniyor:false,hata:"Hata: "+e.message});
    }
  };

  useEffect(()=>{
    const t=setTimeout(()=>{
      const gonAdres=farkliAdres?form.gonAdres:(user&&user.adres?user.adres:form.gonAdres);
      if(gonAdres&&form.alAdres&&form.alAdres.length>5)mesafeHesapla();
    },1000);
    return()=>clearTimeout(t);
  },[form.alAdres,form.gonAdres,farkliAdres]);

  const v1=()=>{
    const e={};
    if(farkliAdres||!user||!user.adres){
      if(!form.gonAd)e.gonAd="Zorunlu";
      if(!form.gonTel)e.gonTel="Zorunlu";
      if(!form.gonAdres)e.gonAdres="Zorunlu";
    }
    if(!form.alAd)e.alAd="Zorunlu";
    if(!form.alTel)e.alTel="Zorunlu";
    if(!form.alAdres)e.alAdres="Alıcı adresi zorunludur";
    if(!form.agirlik)e.agirlik="Ağırlık zorunludur";
    if(kg>20&&(!form.en||!form.boy||!form.yukseklik))e.olcu="20 kg üzeri için ölçüler zorunludur";
    if(mesafeHesap.yukleniyor)e.mesafe="Mesafe hesaplanıyor, lütfen bekleyin";
    if(form.alAdres&&!mesafeHesap.yukleniyor&&mesafe===0)e.mesafe="Geçerli bir alıcı adresi girin";
    return e;
  };

  const v2=()=>{
    const e={};
    if(form.odemeYontemi==="kart"){
      if(!form.kartNo)e.kartNo="Zorunlu";
      if(!form.kartAd)e.kartAd="Zorunlu";
      if(!form.sson)e.sson="Zorunlu";
      if(!form.cvv)e.cvv="Zorunlu";
    }
    return e;
  };

  const next=async()=>{
    const e=step===1?v1():v2();
    if(Object.keys(e).length){setErr(e);return;}
    setErr({});
    if(step===2){
      // Supabase'e sipariş kaydet
      try{
        const{data:{user:u}}=await sb.auth.getUser();
        const gonAdres=farkliAdres?form.gonAdres:(user&&user.adres?user.adres:form.gonAdres);
        const gonAd=farkliAdres?form.gonAd:(user?user.name.split(" ")[0]:"");
        const gonSoyad=farkliAdres?form.gonSoyad:(user?user.name.split(" ")[1]||"":"");
        const gonTel=farkliAdres?form.gonTel:(user?user.tel:"");
        await sb.from("teslimatlar").insert({
          musteri_id:u?.id||null,
          gon_ad:gonAd+" "+gonSoyad,
          gon_tel:gonTel,
          gon_adres:gonAdres,
          al_ad:form.alAd+" "+form.alSoyad,
          al_tel:form.alTel,
          al_adres:form.alAdres,
          agirlik:efKg,
          mesafe:mesafe,
          fiyat:fiyat,
          arac_turu:aracTipi||"motorsiklet",
          durum:"bekliyor",
        });
      }catch(e){console.log("Kayıt hatası:",e);}
      setDone(true);
    }else{setStep(2);}
  };

  if(done)return(
    <div style={{maxWidth:"500px",margin:"40px auto",padding:"0 20px",textAlign:"center"}} className="fade">
      <div style={{fontSize:"56px",marginBottom:"16px"}}>🎉</div>
      <div style={{fontSize:"20px",fontWeight:"900",marginBottom:"8px"}}>Sipariş Oluşturuldu!</div>
      <div style={{fontSize:"13px",color:C.muted,marginBottom:"24px"}}>En yakın kurye bildirim alacak</div>
      <div style={{background:C.card,borderRadius:"14px",padding:"20px",border:"1px solid "+C.border,textAlign:"left",marginBottom:"20px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",fontSize:"12px"}}>
          <div style={{color:C.muted}}>Sipariş No:</div><div style={{fontWeight:"700"}}>#MT-{Math.floor(Math.random()*9000+1000)}</div>
          <div style={{color:C.muted}}>Mesafe:</div><div style={{fontWeight:"700"}}>{Number(mesafe)||"?"} km {mesafeHesap.sure?"(~"+mesafeHesap.sure+")":""}</div>
          <div style={{color:C.muted}}>Tutar:</div><div style={{fontWeight:"700",color:C.accent}}>₺{fiyat}</div>
          <div style={{color:C.muted}}>Araç:</div><div style={{fontWeight:"700"}}>{kg<=15?"🏍️ Motorsiklet":"🚗 Araç/Kamyonet"}</div>
          <div style={{color:C.muted}}>Tahmini süre:</div><div style={{fontWeight:"700"}}>30–60 dk</div>
        </div>
      </div>
      <div style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.25)",borderRadius:"10px",padding:"12px",fontSize:"12px",color:C.success,marginBottom:"20px"}}>
        📱 Kurye paketinizi aldığında 4 haneli teslim kodu SMS ile gelecek
      </div>
      <button onClick={onClose} style={{...btnP,width:"100%",boxShadow:"none"}}>Tamam ✓</button>
    </div>
  );

  return(
    <div style={{maxWidth:"600px",margin:"0 auto",padding:"20px"}} className="fade">
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
        <button onClick={step===1?onClose:()=>setStep(1)} style={{...btnS,padding:"8px 14px",fontSize:"12px"}}>← {step===1?"Geri":"Geri"}</button>
        <div style={{fontSize:"18px",fontWeight:"800"}}>📦 Paket Gönder</div>
      </div>

      {/* Adım göstergesi */}
      <div style={{display:"flex",gap:"4px",marginBottom:"24px"}}>
        {["Adres & Ağırlık","Ödeme"].map((s,i)=>(
          <div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{height:"4px",borderRadius:"2px",marginBottom:"6px",background:step>i+1?C.success:step===i+1?C.accent:C.border,transition:"background .3s"}}/>
            <div style={{fontSize:"10px",color:step===i+1?C.accent:step>i+1?C.success:C.dim,fontWeight:"700"}}>{s}</div>
          </div>
        ))}
      </div>

      {/* ADIM 1 - Adres + Ağırlık */}
      {step===1&&(
        <div className="fade">
          {/* Gönderici */}
          <div style={{background:C.card2,borderRadius:"12px",padding:"16px",marginBottom:"12px",border:"1px solid "+C.border}}>
            <div style={{fontSize:"12px",fontWeight:"700",color:C.accent,marginBottom:"10px"}}>📤 GÖNDERİCİ</div>
            {user&&user.adres?(
              <div>
                {/* Kayıtlı adres kartı */}
                <div style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:"10px",padding:"12px 14px",marginBottom:"12px"}}>
                  <div style={{fontSize:"11px",color:C.success,fontWeight:"700",marginBottom:"4px"}}>✓ Kayıtlı Adresiniz</div>
                  <div style={{fontSize:"13px",fontWeight:"600"}}>{user.name}</div>
                  <div style={{fontSize:"12px",color:C.muted,marginTop:"2px"}}>{user.tel||"—"}</div>
                  <div style={{fontSize:"12px",color:C.muted,marginTop:"2px"}}>{user.adres}</div>
                </div>
                {/* Tik kutusu */}
                <label style={{display:"flex",alignItems:"center",gap:"10px",cursor:"pointer",padding:"10px 14px",borderRadius:"9px",border:"1px dashed "+(farkliAdres?"#e8500a":C.border),background:farkliAdres?"rgba(232,80,10,0.06)":"transparent",marginBottom:farkliAdres?"12px":"0",transition:"all .2s"}}>
                  <input type="checkbox" checked={farkliAdres} onChange={e=>setFarkliAdres(e.target.checked)}
                    style={{width:"16px",height:"16px",accentColor:"#e8500a",cursor:"pointer",flexShrink:0}}/>
                  <span style={{fontSize:"13px",color:farkliAdres?C.accent:C.muted,fontWeight:farkliAdres?"700":"500"}}>
                    📍 Farklı bir adresten gönderim yapacağım
                  </span>
                </label>
                {/* Farklı adres alanı - sadece tik işaretliyse açılır */}
                {farkliAdres&&(
                  <div className="fade">
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                      <div><Inp label="Ad" placeholder="Ahmet" value={form.gonAd} onChange={set("gonAd")}/>{err.gonAd&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.gonAd}</div>}</div>
                      <Inp label="Soyad" placeholder="Yılmaz" value={form.gonSoyad} onChange={set("gonSoyad")}/>
                    </div>
                    <div><Inp label="Telefon" placeholder="0532 123 4567" value={form.gonTel} onChange={set("gonTel")}/>{err.gonTel&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.gonTel}</div>}</div>
                    <div><Inp label="Adres" placeholder="Mahalle, Sokak, Bina No" value={form.gonAdres} onChange={set("gonAdres")}/>{err.gonAdres&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.gonAdres}</div>}</div>
                  </div>
                )}
              </div>
            ):(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                  <div><Inp label="Ad" placeholder="Ahmet" value={form.gonAd} onChange={set("gonAd")}/>{err.gonAd&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.gonAd}</div>}</div>
                  <Inp label="Soyad" placeholder="Yılmaz" value={form.gonSoyad} onChange={set("gonSoyad")}/>
                </div>
                <div><Inp label="Telefon" placeholder="0532 123 4567" value={form.gonTel} onChange={set("gonTel")}/>{err.gonTel&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.gonTel}</div>}</div>
                <div><Inp label="Adres" placeholder="Mahalle, Sokak, Bina No" value={form.gonAdres} onChange={set("gonAdres")}/>{err.gonAdres&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.gonAdres}</div>}</div>
              </div>
            )}
          </div>

          {/* Alıcı */}
          <div style={{background:C.card2,borderRadius:"12px",padding:"16px",marginBottom:"12px",border:"1px solid "+C.border}}>
            <div style={{fontSize:"12px",fontWeight:"700",color:C.success,marginBottom:"10px"}}>📥 ALICI</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
              <div><Inp label="Ad" placeholder="Mehmet" value={form.alAd} onChange={set("alAd")}/>{err.alAd&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.alAd}</div>}</div>
              <Inp label="Soyad" placeholder="Kaya" value={form.alSoyad} onChange={set("alSoyad")}/>
            </div>
            <div><Inp label="Telefon" placeholder="0533 987 6543" value={form.alTel} onChange={set("alTel")}/>{err.alTel&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.alTel}</div>}</div>
            <div><Inp label="Adres" placeholder="Mahalle, Sokak, Bina No — yazınca fiyat hesaplanır" value={form.alAdres} onChange={set("alAdres")}/>{err.alAdres&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.alAdres}</div>}</div>
          </div>

          {/* Ağırlık */}
          <div style={{background:C.card2,borderRadius:"12px",padding:"16px",marginBottom:"12px",border:"1px solid "+C.border}}>
            <div style={{fontSize:"12px",fontWeight:"700",color:C.muted,marginBottom:"10px"}}>⚖️ PAKET BİLGİSİ</div>
            <div><Inp label="Ağırlık (kg)" placeholder="5" type="number" value={form.agirlik} onChange={set("agirlik")}/>{err.agirlik&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.agirlik}</div>}</div>
            {kg>20&&(
              <div className="fade">
                <div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:"10px",padding:"10px",fontSize:"12px",color:C.warn,marginTop:"10px"}}>
                  ⚠️ 20 kg üzeri için desi hesabı yapılır. Lütfen ölçüleri girin.
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px"}}>
                  <Inp label="En (cm)" placeholder="40" type="number" value={form.en} onChange={set("en")}/>
                  <Inp label="Boy (cm)" placeholder="30" type="number" value={form.boy} onChange={set("boy")}/>
                  <Inp label="Yükseklik" placeholder="20" type="number" value={form.yukseklik} onChange={set("yukseklik")}/>
                </div>
                {err.olcu&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.olcu}</div>}
              </div>
            )}
            <Inp label="Açıklama" placeholder="Kırılgan, dikkatli taşınmalı..." value={form.aciklama} onChange={set("aciklama")} optional/>
          </div>

          {/* Mesafe ve Fiyat */}
          {mesafeHesap.yukleniyor&&(
            <div style={{background:"rgba(30,58,96,0.3)",border:"1px solid "+C.navy,borderRadius:"10px",padding:"12px",fontSize:"12px",color:C.muted,display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
              <span className="spin">⏳</span> Mesafe hesaplanıyor...
            </div>
          )}
          {mesafeHesap.hata&&(
            <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"10px",padding:"10px",fontSize:"12px",color:C.error,marginBottom:"12px"}}>
              ⚠️ {mesafeHesap.hata}
            </div>
          )}
          {err.mesafe&&<div style={{color:C.error,fontSize:"11px",marginBottom:"8px"}}>⚠️ {err.mesafe}</div>}
          {efKg>0&&!aracTipi&&(
            <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"10px",padding:"10px",fontSize:"12px",color:C.error,marginBottom:"12px"}}>
              ⚠️ Maksimum ağırlık 27.000 kg'dır.
            </div>
          )}
          {efKg>0&&aracTipi&&mesafe===0&&!mesafeHesap.yukleniyor&&(
            <div style={{background:"rgba(30,58,96,0.3)",border:"1px solid "+C.navy,borderRadius:"10px",padding:"10px",fontSize:"12px",color:C.muted,marginBottom:"12px"}}>
              {aracLabel} seçildi. Alıcı adresi girilince fiyat hesaplanacak.
            </div>
          )}
          {fiyat>0&&!mesafeHesap.yukleniyor&&(
            <div style={{background:"linear-gradient(135deg,rgba(232,80,10,0.12),rgba(30,58,96,0.25))",border:"1px solid "+C.accent,borderRadius:"14px",padding:"18px",marginBottom:"12px"}} className="fade">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                <div style={{fontSize:"12px",fontWeight:"700",color:C.accent}}>💰 FİYAT HESAPLAMA</div>
                <div style={{fontSize:"12px",fontWeight:"800",padding:"4px 10px",borderRadius:"8px",background:"rgba(232,80,10,0.15)",color:C.accent}}>{aracLabel}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",fontSize:"12px",marginBottom:"12px"}}>
                <div style={{color:C.muted}}>Mesafe:</div>
                <div style={{fontWeight:"600",color:C.success}}>{mesafe.toFixed(1)} km {mesafeHesap.sure?"(~"+mesafeHesap.sure+")":""}</div>
                <div style={{color:C.muted}}>Efektif ağırlık:</div>
                <div style={{fontWeight:"600"}}>{efKg.toFixed(1)} kg</div>
                {fiyatDetay&&fiyatDetay.sabit>0&&<><div style={{color:C.muted}}>Sabit ücret:</div><div style={{fontWeight:"600"}}>₺{fiyatDetay.sabit}</div></>}
                {fiyatDetay&&fiyatDetay.acilis>0&&<><div style={{color:C.muted}}>Açılış ücreti:</div><div style={{fontWeight:"600"}}>₺{fiyatDetay.acilis}</div></>}
                {fiyatDetay&&fiyatDetay.mesafeUcret>0&&(
                  <><div style={{color:C.muted}}>Mesafe ücreti:</div>
                  <div style={{fontWeight:"600"}}>₺{fiyatDetay.mesafeUcret} ({fiyatDetay.birimSayisi} × ₺{fiyatDetay.perBirim}{fiyatDetay.uzun?" /km":" /100m"})</div></>
                )}
                <div style={{color:C.muted}}>Komisyon (%30):</div>
                <div style={{fontWeight:"600",color:C.muted}}>₺{komisyon}</div>
                <div style={{color:C.muted}}>Kurye kazancı:</div>
                <div style={{fontWeight:"600",color:C.success}}>₺{kuryeKazanc}</div>
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:"13px",fontWeight:"700"}}>Toplam Ücret</span>
                <span style={{fontSize:"28px",fontWeight:"900",color:C.accent}}>₺{fiyat}</span>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ADIM 2 - Ödeme */}
      {step===2&&(
        <div className="fade">
          <div style={{background:C.card2,borderRadius:"12px",padding:"14px",border:"1px solid "+C.border,marginBottom:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:"12px",color:C.muted}}>Toplam Tutar</div>
            <div style={{fontSize:"24px",fontWeight:"900",color:C.accent}}>₺{fiyat}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"16px"}}>
            {[
              {v:"kart",icon:"💳",title:"Yeni Kart",sub:"Visa, Mastercard, Troy"},
              {v:"kayitli",icon:"⚡",title:"Kayıtlı Kart",sub:"•••• 4521 — Tek tıkla öde"},
              {v:"cuzdan",icon:"👛",title:"MotoTeslim Cüzdanı",sub:"Bakiye: ₺850"},
            ].map(o=>(
              <div key={o.v} onClick={()=>setForm(f=>({...f,odemeYontemi:o.v}))} style={{padding:"13px 16px",borderRadius:"12px",cursor:"pointer",border:"2px solid "+(form.odemeYontemi===o.v?C.accent:C.border),background:form.odemeYontemi===o.v?C.accentGlow:C.card2,transition:"all .2s"}}>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <span style={{fontSize:"20px"}}>{o.icon}</span>
                  <div>
                    <div style={{fontSize:"13px",fontWeight:"700",color:form.odemeYontemi===o.v?C.accent:C.text}}>{o.title}</div>
                    <div style={{fontSize:"11px",color:C.muted}}>{o.sub}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
          {form.odemeYontemi==="kart"&&(
            <div style={{background:C.card2,borderRadius:"12px",padding:"16px",border:"1px solid "+C.border}}>
              <div><Inp label="Kart Numarası" placeholder="1234 5678 9012 3456" value={form.kartNo} onChange={set("kartNo")}/>{err.kartNo&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.kartNo}</div>}</div>
              <Inp label="Kart Sahibi" placeholder="AHMET YILMAZ" value={form.kartAd} onChange={set("kartAd")}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                <div><Inp label="Son Kullanma" placeholder="MM/YY" value={form.sson} onChange={set("sson")}/>{err.sson&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.sson}</div>}</div>
                <div><Inp label="CVV" placeholder="123" type="password" value={form.cvv} onChange={set("cvv")}/>{err.cvv&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.cvv}</div>}</div>
              </div>
              <label style={{display:"flex",alignItems:"center",gap:"8px",marginTop:"12px",cursor:"pointer",fontSize:"12px",color:C.muted}}>
                <input type="checkbox" checked={form.kartKaydet} onChange={setCheck("kartKaydet")} style={{accentColor:C.accent}}/>
                <span>Kartı kaydet — sonraki seferde tek tıkla öde <span style={{color:C.accent,fontWeight:"700"}}>(PayTR Tokenization)</span></span>
              </label>
            </div>
          )}
          {form.odemeYontemi!=="kart"&&(
            <div style={{background:"rgba(34,197,94,0.05)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:"12px",padding:"14px",fontSize:"12px",color:C.muted}}>
              ✅ {form.odemeYontemi==="kayitli"?"Kayıtlı kartınızla ödeme yapılacak.":"Cüzdanınızdan ₺"+fiyat+" düşülecek."}
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginTop:"14px",padding:"10px 12px",background:"rgba(30,58,96,0.3)",borderRadius:"9px",border:"1px solid "+C.navy}}>
            <span>🔒</span>
            <span style={{fontSize:"11px",color:C.dim}}>Tüm ödemeler <b style={{color:C.muted}}>PayTR</b> altyapısı ile 256-bit SSL şifreli işlenmektedir.</span>
          </div>
        </div>
      )}

      {/* Devam butonu */}
      <div style={{display:"flex",gap:"10px",marginTop:"22px"}}>
        {step===2&&<button onClick={()=>setStep(1)} style={{...btnS,flex:"none",padding:"11px 20px",fontSize:"13px"}}>← Geri</button>}
        <button onClick={next}
          disabled={step===1&&(mesafeHesap.yukleniyor||(kg>0&&mesafe===0&&form.alAdres.length>0&&!mesafeHesap.hata))}
          style={{...btnP,flex:1,boxShadow:"none",padding:"12px",
            opacity:step===1&&(mesafeHesap.yukleniyor||(kg>0&&mesafe===0&&form.alAdres.length>0&&!mesafeHesap.hata))?0.4:1}}>
          {step===1&&mesafeHesap.yukleniyor?"⏳ Mesafe hesaplanıyor..."
            :step===2?(form.odemeYontemi==="cuzdan"?"👛 Cüzdanla Öde":form.odemeYontemi==="kayitli"?"⚡ Kayıtlı Kartla Öde":"💳 Ödemeyi Tamamla")
            :"Ödemeye Geç →"}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   KURYE KAYIT
══════════════════════════════════════════════ */
function KuryeKayit({onClose, onSuccess}){
  const[step,setStep]=useState(1);
  const[loading,setLoading]=useState(false);
  const[alert,setAlert]=useState({type:"",msg:""});
  const[sozlesmeOnay,setSozlesmeOnay]=useState(false);
  const[kvkkOnay,setKvkkOnay]=useState(false);
  const[yasal,setYasal]=useState(null);
  const[form,setForm]=useState({
    ad:"",soyad:"",tc:"",tel:"",email:"",sifre:"",
    arac:"motorsiklet",marka:"",model:"",plaka:"",
    vergiNo:"",vergiD:"",iban:"",ibanAd:"",refKod:""
  });
  const[err,setErr]=useState({});
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const v1=()=>{const e={};
    if(!form.ad.trim())e.ad="Zorunlu";
    if(!form.soyad.trim())e.soyad="Zorunlu";
    if(!form.tel.trim())e.tel="Zorunlu";
    if(!form.email.trim())e.email="Zorunlu";
    if(form.sifre.length<6)e.sifre="En az 6 karakter";
    return e;};
  const v2=()=>{const e={};if(!form.plaka.trim())e.plaka="Zorunlu";return e;};

  const v3=()=>{const e={};
    if(!form.iban)e.iban="IBAN zorunludur";
    return e;
  };
  const next=()=>{
    const e=step===1?v1():step===2?v2():v3();
    if(Object.keys(e).length){setErr(e);return;}
    setErr({});if(step<3)setStep(step+1);
  };

  const kayitOl=async()=>{
    setLoading(true);setAlert({type:"",msg:""});
    try{
      // Supabase Auth ile kayıt
      const{data,error}=await sb.auth.signUp({
        email:form.email,
        password:form.sifre,
        options:{data:{
          ad:form.ad, soyad:form.soyad, tel:form.tel,
          tc:form.tc, rol:"kurye"
        }}
      });
      if(error)throw error;

      // Kuryeler tablosuna kayıt
      await sb.from("kuryeler").insert({
        user_id:data.user.id,
        ad:form.ad, soyad:form.soyad, tel:form.tel, tc:form.tc,
        arac_turu:form.arac, arac_marka:form.marka,
        arac_model:form.model, plaka:form.plaka,
        vergi_no:form.vergiNo, vergi_dairesi:form.vergiD,
        iban:form.iban, iban_ad:form.ibanAd||(form.ad+" "+form.soyad),
        durum:"beklemede",
        ref_kod:form.tel.replace(/\D/g,"").replace(/^0/,""),
        davetci_kod:form.refKod.trim()||null
      });

      // Referans zinciri kaydet
      if(form.refKod.trim()){
        const davetciKod=form.refKod.trim().replace(/\D/g,"").replace(/^0/,"");
        const yeniTel=form.tel.replace(/\D/g,"").replace(/^0/,"");
        // 1. katman
        await sb.from("referanslar").insert({davetci_tel:davetciKod,davet_edilen_tel:yeniTel,davet_edilen_tip:"kurye",katman:1});
        // 2. katman - davetcinin davetcisini bul
        const{data:kat1}=await sb.from("kuryeler").select("davetci_kod").eq("ref_kod",davetciKod).maybeSingle();
        if(kat1?.davetci_kod){
          await sb.from("referanslar").insert({davetci_tel:kat1.davetci_kod,davet_edilen_tel:yeniTel,davet_edilen_tip:"kurye",katman:2});
          // 3. katman
          const{data:kat2}=await sb.from("kuryeler").select("davetci_kod").eq("ref_kod",kat1.davetci_kod).maybeSingle();
          if(kat2?.davetci_kod){
            await sb.from("referanslar").insert({davetci_tel:kat2.davetci_kod,davet_edilen_tel:yeniTel,davet_edilen_tip:"kurye",katman:3});
          }
        }
      }

      setAlert({type:"success",msg:"✓ Kayıt başarılı! E-postanı doğrula, sonra giriş yapabilirsin."});
      setTimeout(()=>{onSuccess({name:form.ad+" "+form.soyad,type:"kurye"});},2000);
    }catch(e){
      setAlert({type:"error",msg:"Hata: "+( e.message==="User already registered"?"Bu e-posta zaten kayıtlı.":e.message)});
    }
    setLoading(false);
  };

  return(
    <div style={modalStyle} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={mBox} className="fade">
        <button style={{position:"absolute",top:"14px",right:"16px",background:"none",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}} onClick={onClose}>×</button>

        {/* Steps */}
        <div style={{display:"flex",gap:"6px",marginBottom:"22px"}}>
          {["Kişisel","Araç","Vergi"].map((s,i)=>(
            <div key={i} style={{flex:1,textAlign:"center"}}>
              <div style={{width:"24px",height:"24px",borderRadius:"50%",margin:"0 auto 4px",
                background:step>i+1?C.success:step===i+1?C.accent:C.inBg,
                border:"2px solid "+(step>=i+1?(step>i+1?C.success:C.accent):C.border),
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:"10px",fontWeight:"700",color:step>=i+1?"#fff":C.dim}}>
                {step>i+1?"✓":i+1}
              </div>
              <div style={{fontSize:"9px",color:step===i+1?C.accent:C.dim,fontWeight:"600"}}>{s}</div>
            </div>
          ))}
        </div>

        {step===1&&(<>
          <div style={{fontSize:"18px",fontWeight:"800",marginBottom:"4px"}}>🏍️ Kurye Ol</div>
          <div style={{fontSize:"12px",color:C.muted,marginBottom:"16px"}}>Kişisel bilgilerini gir</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
            <div><Inp label="Ad" placeholder="Ahmet" value={form.ad} onChange={set("ad")}/>{err.ad&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.ad}</div>}</div>
            <div><Inp label="Soyad" placeholder="Yılmaz" value={form.soyad} onChange={set("soyad")}/>{err.soyad&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.soyad}</div>}</div>
          </div>
          <Inp label="TC Kimlik No" placeholder="12345678901" value={form.tc} onChange={set("tc")} optional/>
          <div><Inp label="Telefon" placeholder="0532 123 4567" value={form.tel} onChange={set("tel")}/>{err.tel&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.tel}</div>}</div>
          <div><Inp label="E-posta" placeholder="ahmet@email.com" type="email" value={form.email} onChange={set("email")}/>{err.email&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.email}</div>}</div>
          <div><Inp label="Şifre" placeholder="En az 6 karakter" type="password" value={form.sifre} onChange={set("sifre")}/>{err.sifre&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.sifre}</div>}</div>
          <Inp label="Referans Kodu (opsiyonel)" placeholder="Sizi davet edenin tel no (05xx...)" value={form.refKod} onChange={set("refKod")} optional/>
        </>)}

        {step===2&&(<>
          <div style={{fontSize:"18px",fontWeight:"800",marginBottom:"4px"}}>🚗 Araç Bilgileri</div>
          <div style={{fontSize:"12px",color:C.muted,marginBottom:"16px"}}>Araç türüne göre uygun teslimatlar gelecek</div>
          <div style={{display:"flex",gap:"8px",marginBottom:"4px"}}>
            {[{v:"motorsiklet",e:"🏍️",l:"Motorsiklet",s:"≤15 kg"},{v:"otomobil",e:"🚗",l:"Otomobil",s:"15–100 kg"},{v:"kamyonet",e:"🚐",l:"Kamyonet",s:"15–100 kg"}].map(a=>(
              <div key={a.v} onClick={()=>setForm(f=>({...f,arac:a.v}))} style={{flex:1,padding:"10px 6px",borderRadius:"10px",textAlign:"center",cursor:"pointer",
                border:"2px solid "+(form.arac===a.v?C.accent:C.border),
                background:form.arac===a.v?C.accentGlow:C.inBg,
                fontSize:"11px",fontWeight:"700",color:form.arac===a.v?C.accent:C.muted,transition:"all .2s"}}>
                <div style={{fontSize:"18px",marginBottom:"3px"}}>{a.e}</div>
                <div>{a.l}</div>
                <div style={{fontSize:"9px",color:C.dim,marginTop:"2px"}}>{a.s}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
            <Inp label="Araç Markası" placeholder="Honda" value={form.marka} onChange={set("marka")} optional/>
            <Inp label="Araç Modeli" placeholder="PCX 125" value={form.model} onChange={set("model")} optional/>
          </div>
          <div><Inp label="Plaka" placeholder="34 ABC 123" value={form.plaka} onChange={set("plaka")}/>{err.plaka&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.plaka}</div>}</div>
        </>)}

        {step===3&&(<>
          <div style={{fontSize:"18px",fontWeight:"800",marginBottom:"4px"}}>📋 Vergi Bilgileri</div>
          <div style={{fontSize:"12px",color:C.muted,marginBottom:"16px"}}>İsteğe bağlı</div>
          <div style={{background:C.accentGlow,border:"1px solid rgba(232,80,10,0.3)",borderRadius:"10px",padding:"10px 13px",fontSize:"12px",color:C.accentL,marginBottom:"14px"}}>
            💡 Vergi bilgilerin olmasa da kayıt olabilirsin. Ödeme alabilmek için daha sonra eklemeniz gerekecek.
          </div>
          <Inp label="Vergi No" placeholder="1234567890" value={form.vergiNo} onChange={set("vergiNo")} optional/>
          <Inp label="Vergi Dairesi" placeholder="Kadıköy Vergi Dairesi" value={form.vergiD} onChange={set("vergiD")} optional/>
          <div style={{marginTop:"8px",borderTop:"1px solid "+C.border,paddingTop:"14px"}}>
            <div style={{fontSize:"12px",fontWeight:"700",color:C.accent,marginBottom:"8px"}}>💳 ÖDEME BİLGİLERİ</div>
            <div style={{fontSize:"11px",color:C.muted,marginBottom:"10px"}}>Kazancınız bu IBAN'a aktarılacaktır.</div>
            <Inp label="IBAN" placeholder="TR00 0000 0000 0000 0000 0000 00" value={form.iban} onChange={set("iban")}/>
            {err.iban&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.iban}</div>}
            <Inp label="Hesap Sahibi Adı" placeholder="Ad Soyad" value={form.ibanAd||form.ad+" "+form.soyad} onChange={set("ibanAd")}/>
          </div>
        </>)}

        {step===3&&(
          <div style={{marginTop:"14px",display:"flex",flexDirection:"column",gap:"10px"}}>
            {[
              {s:sozlesmeOnay,fn:setSozlesmeOnay,tip:"kullanim",label:"Kullanım Koşulları ve Mesafeli Satış Sözleşmesini"},
              {s:kvkkOnay,fn:setKvkkOnay,tip:"kvkk",label:"KVKK Aydınlatma Metnini"},
            ].map(x=>(
              <label key={x.tip} style={{display:"flex",alignItems:"flex-start",gap:"10px",cursor:"pointer",padding:"10px 12px",borderRadius:"9px",border:"1px solid "+(x.s?"rgba(34,197,94,0.4)":"rgba(239,68,68,0.2)"),background:x.s?"rgba(34,197,94,0.05)":"rgba(239,68,68,0.03)"}}>
                <input type="checkbox" checked={x.s} onChange={e=>x.fn(e.target.checked)} style={{width:"15px",height:"15px",accentColor:"#22c55e",cursor:"pointer",flexShrink:0,marginTop:"2px"}}/>
                <span style={{fontSize:"12px",color:"#94a3b8"}}>
                  <span onClick={e=>{e.preventDefault();setYasal(x.tip);}} style={{color:"#60a5fa",textDecoration:"underline",cursor:"pointer"}}>{x.label}</span> okudum ve kabul ediyorum. *
                </span>
              </label>
            ))}
          </div>
        )}

        <Alert type={alert.type} msg={alert.msg}/>

        <div style={{display:"flex",gap:"10px",marginTop:"20px"}}>
          {step>1&&<button onClick={()=>setStep(step-1)} style={{...btnS,flex:"none",padding:"10px 18px",fontSize:"13px"}}>← Geri</button>}
          {step<3
            ?<button onClick={next} style={{...btnP,flex:1,padding:"11px",boxShadow:"none"}}>Devam →</button>
            :<button onClick={kayitOl} disabled={loading||!sozlesmeOnay||!kvkkOnay} style={{...btnP,flex:1,padding:"11px",boxShadow:"none",opacity:(loading||!sozlesmeOnay||!kvkkOnay)?0.5:1}}>
              {loading?<span className="spin">⏳</span>:"✓ Kayıt Ol"}
            </button>
          }
        </div>
      </div>

      {/* Yasal metin modal */}
      {yasal&&<YasalModal tip={yasal} onClose={()=>setYasal(null)}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════
   KURYE GİRİŞ
══════════════════════════════════════════════ */
function SifreUnuttum(){
  const[acik,setAcik]=useState(false);
  const[email,setEmail]=useState("");
  const[loading,setLoading]=useState(false);
  const[alert,setAlert]=useState({type:"",msg:""});

  const gonder=async()=>{
    if(!email.trim()){setAlert({type:"error",msg:"E-posta adresi zorunludur."});return;}
    setLoading(true);setAlert({type:"",msg:""});
    try{
      const{error}=await sb.auth.resetPasswordForEmail(email,{
        redirectTo:window.location.origin+"?reset=true"
      });
      if(error)throw error;
      // SMS ile de bildir
      const{data:musteri}=await sb.from("musteriler").select("tel").eq("user_id",(await sb.auth.getUser()).data.user?.id).maybeSingle();
      if(musteri?.tel){
        await smsSend(musteri.tel,"MotoTeslim: Sifre sifirlama baglantisi e-posta adresinize gonderildi.");
      }
      setAlert({type:"success",msg:"✓ Şifre sıfırlama bağlantısı e-postana gönderildi!"});
      setTimeout(()=>setAcik(false),3000);
    }catch(e){
      setAlert({type:"error",msg:"Hata: "+e.message});
    }
    setLoading(false);
  };

  return(
    <div style={{marginTop:"12px"}}>
      {!acik?(
        <div style={{textAlign:"center"}}>
          <span onClick={()=>setAcik(true)} style={{fontSize:"12px",color:C.muted,cursor:"pointer",textDecoration:"underline"}}>
            Şifremi unuttum
          </span>
        </div>
      ):(
        <div style={{background:"rgba(30,58,96,0.3)",border:"1px solid "+C.navy,borderRadius:"12px",padding:"16px",marginTop:"8px"}} className="fade">
          <div style={{fontSize:"13px",fontWeight:"700",marginBottom:"10px"}}>🔑 Şifre Sıfırla</div>
          <div style={{fontSize:"12px",color:C.muted,marginBottom:"12px"}}>E-posta adresine şifre sıfırlama bağlantısı göndereceğiz.</div>
          <input type="email" placeholder="E-posta adresin" value={email} onChange={e=>setEmail(e.target.value)}
            style={{width:"100%",padding:"10px 13px",borderRadius:"9px",border:"1px solid "+C.inBorder,background:C.inBg,color:C.text,fontSize:"13px",outline:"none",boxSizing:"border-box",marginBottom:"10px"}}/>
          {alert.msg&&(
            <div style={{background:alert.type==="error"?"rgba(239,68,68,0.1)":"rgba(34,197,94,0.1)",border:"1px solid "+(alert.type==="error"?"rgba(239,68,68,0.3)":"rgba(34,197,94,0.3)"),borderRadius:"8px",padding:"8px 12px",fontSize:"11px",color:alert.type==="error"?C.error:C.success,marginBottom:"10px"}}>
              {alert.msg}
            </div>
          )}
          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={()=>{setAcik(false);setEmail("");setAlert({type:"",msg:""}); }} style={{...btnS,flex:"none",padding:"8px 14px",fontSize:"12px"}}>İptal</button>
            <button onClick={gonder} disabled={loading} style={{...btnP,flex:1,padding:"9px",fontSize:"12px",boxShadow:"none",opacity:loading?0.7:1}}>
              {loading?<span className="spin">⏳</span>:"Gönder"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function KuryeGiris({onClose, onSuccess}){
  const[form,setForm]=useState({email:"",sifre:""});
  const[loading,setLoading]=useState(false);
  const[alert,setAlert]=useState({type:"",msg:""});
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const girisYap=async()=>{
    if(!form.email||!form.sifre){setAlert({type:"error",msg:"E-posta ve şifre zorunludur."});return;}
    setLoading(true);setAlert({type:"",msg:""});
    try{
      const{data,error}=await sb.auth.signInWithPassword({email:form.email,password:form.sifre});
      if(error)throw error;
      const meta=data.user.user_metadata;
      onSuccess({name:(meta.ad||"Kurye")+" "+(meta.soyad||""),type:"kurye",email:form.email});
    }catch(e){
      setAlert({type:"error",msg:e.message==="Invalid login credentials"?"E-posta veya şifre hatalı.":"Hata: "+e.message});
    }
    setLoading(false);
  };

  return(
    <div style={modalStyle} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={mBox} className="fade">
        <button style={{position:"absolute",top:"14px",right:"16px",background:"none",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}} onClick={onClose}>×</button>
        <div style={{fontSize:"18px",fontWeight:"800",marginBottom:"4px"}}>🏍️ Kurye Girişi</div>
        <div style={{fontSize:"12px",color:C.muted,marginBottom:"16px"}}>Hesabına giriş yap</div>
        <Inp label="E-posta" placeholder="ahmet@email.com" value={form.email} onChange={set("email")}/>
        <Inp label="Şifre" placeholder="••••••••" type="password" value={form.sifre} onChange={set("sifre")}/>
        <Alert type={alert.type} msg={alert.msg}/>
        <button onClick={girisYap} disabled={loading}
          style={{...btnP,width:"100%",marginTop:"18px",boxShadow:"none",opacity:loading?0.7:1}}>
          {loading?<span className="spin">⏳</span>:"Giriş Yap"}
        </button>
        <SifreUnuttum/>
        <div style={{textAlign:"center",marginTop:"14px",fontSize:"12px",color:C.muted}}>
          Hesabın yok mu? <span onClick={onClose} style={{color:C.accent,cursor:"pointer",fontWeight:"700"}}>Kurye ol →</span>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   GÖNDERİCİ KAYIT/GİRİŞ
══════════════════════════════════════════════ */
function GondericiModal({onClose, onSuccess}){
  const[tab,setTab]=useState("giris");
  const[loading,setLoading]=useState(false);
  const[alert,setAlert]=useState({type:"",msg:""});
  const[form,setForm]=useState({ad:"",soyad:"",email:"",tel:"",tc:"",adres:"",sifre:"",refKod:"",iban:"",pazarlamaKatil:false});
  const[err,setErr]=useState({});
  const[sozlesmeOnay,setSozlesmeOnay]=useState(false);
  const[kvkkOnay,setKvkkOnay]=useState(false);
  const[yasal,setYasal]=useState(null);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const giris=async()=>{
    if(!form.email||!form.sifre){setAlert({type:"error",msg:"E-posta ve şifre zorunludur."});return;}
    setLoading(true);setAlert({type:"",msg:""});
    try{
      const{data,error}=await sb.auth.signInWithPassword({email:form.email,password:form.sifre});
      if(error)throw error;
      const meta=data.user.user_metadata;
      const{data:md}=await sb.from("musteriler").select("*").eq("user_id",data.user.id).maybeSingle();
      const adres=(md?.adres)||meta.adres||"";
      const tel=(md?.tel)||meta.tel||"";
      onSuccess({name:(meta.ad||"Kullanıcı")+" "+(meta.soyad||""),type:"uye",adres,tel},true);
    }catch(e){
      setAlert({type:"error",msg:e.message==="Invalid login credentials"?"E-posta veya şifre hatalı.":"Hata: "+e.message});
    }
    setLoading(false);
  };

  const kayit=async()=>{
    const e={};
    if(!form.ad.trim())e.ad="Zorunlu";
    if(!form.soyad.trim())e.soyad="Zorunlu";
    if(!form.email.trim())e.email="Zorunlu";
    if(!form.tel.trim())e.tel="Zorunlu";
    if(form.sifre.length<6)e.sifre="En az 6 karakter";
    if(Object.keys(e).length){setErr(e);return;}
    setLoading(true);setAlert({type:"",msg:""});
    try{
      const{data,error}=await sb.auth.signUp({
        email:form.email,password:form.sifre,
        options:{data:{ad:form.ad,soyad:form.soyad,tel:form.tel,tc:form.tc,adres:form.adres,rol:"musteri"}}
      });
      if(error)throw error;
      await sb.from("musteriler").insert({
        user_id:data.user.id,
        ad:form.ad,soyad:form.soyad,tel:form.tel,tc:form.tc,adres:form.adres,
        ref_kod:form.tel.replace(/[^0-9]/g,"").replace(/^0/,""),
        davetci_kod:form.refKod.trim()||null,
        iban:form.pazarlamaKatil?form.iban.trim()||null:null,
        bakiye:0
      });

      // Referans zinciri kaydet
      if(form.refKod.trim()){
        const davetciKod=form.refKod.trim().replace(/\D/g,"").replace(/^0/,"");
        const yeniTel=form.tel.replace(/[^0-9]/g,"").replace(/^0/,"");
        await sb.from("referanslar").insert({davetci_tel:davetciKod,davet_edilen_tel:yeniTel,davet_edilen_tip:"musteri",katman:1});
        // 2. katman
        const{data:kat1k}=await sb.from("kuryeler").select("davetci_kod").eq("ref_kod",davetciKod).maybeSingle();
        const{data:kat1m}=await sb.from("musteriler").select("davetci_kod").eq("ref_kod",davetciKod).maybeSingle();
        const kat1dc=(kat1k||kat1m)?.davetci_kod;
        if(kat1dc){
          await sb.from("referanslar").insert({davetci_tel:kat1dc,davet_edilen_tel:yeniTel,davet_edilen_tip:"musteri",katman:2});
          const{data:kat2k}=await sb.from("kuryeler").select("davetci_kod").eq("ref_kod",kat1dc).maybeSingle();
          const{data:kat2m}=await sb.from("musteriler").select("davetci_kod").eq("ref_kod",kat1dc).maybeSingle();
          const kat2dc=(kat2k||kat2m)?.davetci_kod;
          if(kat2dc){
            await sb.from("referanslar").insert({davetci_tel:kat2dc,davet_edilen_tel:yeniTel,davet_edilen_tip:"musteri",katman:3});
          }
        }
      }

      setAlert({type:"success",msg:"✓ Kayıt başarılı! E-postanı doğrula."});
      setTimeout(()=>onSuccess({name:form.ad+" "+form.soyad,type:"uye"}),2000);
    }catch(e){
      setAlert({type:"error",msg:e.message==="User already registered"?"Bu e-posta zaten kayıtlı.":"Hata: "+e.message});
    }
    setLoading(false);
  };

  const misafir=()=>{
    const e={};
    if(!form.ad.trim())e.ad="Zorunlu";
    if(!form.soyad.trim())e.soyad="Zorunlu";
    if(!form.tel.trim())e.tel="Zorunlu";
    if(!form.adres.trim())e.adres="Zorunlu";
    if(Object.keys(e).length){setErr(e);return;}
    onSuccess({name:form.ad+" "+form.soyad,type:"misafir"});
  };

  return(<>
    <div style={modalStyle} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={mBox} className="fade">
        <button style={{position:"absolute",top:"14px",right:"16px",background:"none",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}} onClick={onClose}>×</button>
        <div style={{fontSize:"18px",fontWeight:"800",marginBottom:"4px"}}>📦 Paket Gönder</div>
        <div style={{fontSize:"12px",color:C.muted,marginBottom:"16px"}}>Giriş yap veya misafir olarak devam et</div>
        <div style={{display:"flex",gap:"6px",marginBottom:"20px",background:C.inBg,borderRadius:"10px",padding:"4px"}}>
          {[["giris","Giriş Yap"],["kayit","Kayıt Ol"],["misafir","Misafir"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setTab(v);setErr({});setAlert({type:"",msg:""}); }} style={{flex:1,padding:"8px",borderRadius:"7px",border:"none",background:tab===v?C.accent:"transparent",color:tab===v?"#fff":C.muted,fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>{l}</button>
          ))}
        </div>

        {tab==="giris"&&(<>
          <Inp label="E-posta" placeholder="ahmet@email.com" value={form.email} onChange={set("email")}/>
          <Inp label="Şifre" placeholder="••••••••" type="password" value={form.sifre} onChange={set("sifre")}/>
          <Alert type={alert.type} msg={alert.msg}/>
          <button onClick={giris} disabled={loading} style={{...btnP,width:"100%",marginTop:"16px",boxShadow:"none",opacity:loading?0.7:1}}>
            {loading?<span className="spin">⏳</span>:"Giriş Yap"}
          </button>
          <SifreUnuttum/>
        </>)}

        {tab==="kayit"&&(<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
            <div><Inp label="Ad" placeholder="Ahmet" value={form.ad} onChange={set("ad")}/>{err.ad&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.ad}</div>}</div>
            <div><Inp label="Soyad" placeholder="Yılmaz" value={form.soyad} onChange={set("soyad")}/>{err.soyad&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.soyad}</div>}</div>
          </div>
          <Inp label="TC" placeholder="12345678901" value={form.tc} onChange={set("tc")} optional/>
          <div><Inp label="Telefon" placeholder="0532 123 4567" value={form.tel} onChange={set("tel")}/>{err.tel&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.tel}</div>}</div>
          <div><Inp label="E-posta" placeholder="ahmet@email.com" type="email" value={form.email} onChange={set("email")}/>{err.email&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.email}</div>}</div>
          <Inp label="Adres" placeholder="Mahalle, Sokak, No..." value={form.adres} onChange={set("adres")} optional/>
          <div><Inp label="Şifre" placeholder="En az 6 karakter" type="password" value={form.sifre} onChange={set("sifre")}/>{err.sifre&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.sifre}</div>}</div>
          <Inp label="Referans Kodu (opsiyonel)" placeholder="Sizi davet edenin tel no (05xx...)" value={form.refKod} onChange={set("refKod")} optional/>
          {/* Pazarlama planı */}
          <label style={{display:"flex",alignItems:"flex-start",gap:"10px",cursor:"pointer",padding:"12px 14px",borderRadius:"10px",border:"1px dashed "+(form.pazarlamaKatil?"rgba(232,80,10,0.5)":"#1e3a5f"),background:form.pazarlamaKatil?"rgba(232,80,10,0.06)":"transparent"}}>
            <input type="checkbox" checked={form.pazarlamaKatil} onChange={e=>setForm(f=>({...f,pazarlamaKatil:e.target.checked}))}
              style={{width:"16px",height:"16px",accentColor:"#e8500a",cursor:"pointer",flexShrink:0,marginTop:"2px"}}/>
            <div>
              <div style={{fontSize:"13px",fontWeight:"700",color:form.pazarlamaKatil?"#e8500a":"#94a3b8"}}>🏆 Pazarlama planına katılmak istiyorum</div>
              <div style={{fontSize:"11px",color:"#475569",marginTop:"2px"}}>Davet ettiğin kişilerin işlemlerinden %5/%3/%1 prim kazan</div>
            </div>
          </label>
          {form.pazarlamaKatil&&(
            <div className="fade">
              <Inp label="IBAN (ödeme için)" placeholder="TR00 0000 0000 0000 0000 0000 00" value={form.iban} onChange={set("iban")} optional/>
              <div style={{fontSize:"11px",color:"#475569",marginTop:"-8px",marginBottom:"8px"}}>IBAN girerseniz biriken primlerinizi çekme talebinde bulunabilirsiniz.</div>
            </div>
          )}
          {/* Sözleşme onayları - kayıt */}
          <div style={{display:"flex",flexDirection:"column",gap:"8px",marginTop:"10px"}}>
            {[
              {s:sozlesmeOnay,fn:setSozlesmeOnay,tip:"kullanim",label:"Kullanım Koşulları ve Mesafeli Satış Sözleşmesini"},
              {s:kvkkOnay,fn:setKvkkOnay,tip:"kvkk",label:"KVKK Aydınlatma Metnini"},
            ].map(x=>(
              <label key={x.tip} style={{display:"flex",alignItems:"flex-start",gap:"10px",cursor:"pointer",padding:"9px 12px",borderRadius:"9px",border:"1px solid "+(x.s?"rgba(34,197,94,0.4)":"rgba(239,68,68,0.2)"),background:x.s?"rgba(34,197,94,0.05)":"rgba(239,68,68,0.03)"}}>
                <input type="checkbox" checked={x.s} onChange={e=>x.fn(e.target.checked)} style={{width:"15px",height:"15px",accentColor:"#22c55e",cursor:"pointer",flexShrink:0,marginTop:"2px"}}/>
                <span style={{fontSize:"12px",color:"#94a3b8"}}>
                  <span onClick={e=>{e.preventDefault();setYasal(x.tip);}} style={{color:"#60a5fa",textDecoration:"underline",cursor:"pointer"}}>{x.label}</span> okudum ve kabul ediyorum. *
                </span>
              </label>
            ))}
          </div>
          <Alert type={alert.type} msg={alert.msg}/>
          <button onClick={kayit} disabled={loading||!sozlesmeOnay||!kvkkOnay} style={{...btnP,width:"100%",marginTop:"16px",boxShadow:"none",opacity:(loading||!sozlesmeOnay||!kvkkOnay)?0.5:1}}>
            {loading?<span className="spin">⏳</span>:"Kayıt Ol"}
          </button>
        </>)}

        {tab==="misafir"&&(<>
          <div style={{background:C.accentGlow,border:"1px solid rgba(232,80,10,0.3)",borderRadius:"10px",padding:"10px 13px",fontSize:"12px",color:C.accentL,marginBottom:"14px"}}>👤 Hesap açmadan da gönderi yapabilirsin.</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
            <div><Inp label="Ad" placeholder="Ahmet" value={form.ad} onChange={set("ad")}/>{err.ad&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.ad}</div>}</div>
            <div><Inp label="Soyad" placeholder="Yılmaz" value={form.soyad} onChange={set("soyad")}/>{err.soyad&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.soyad}</div>}</div>
          </div>
          <div><Inp label="Telefon" placeholder="0532 123 4567" value={form.tel} onChange={set("tel")}/>{err.tel&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.tel}</div>}</div>
          <div><Inp label="Adres" placeholder="Tam adresiniz" value={form.adres} onChange={set("adres")}/>{err.adres&&<div style={{color:C.error,fontSize:"10px",marginTop:"3px"}}>{err.adres}</div>}</div>
          {/* Sözleşme onayları - misafir */}
          <div style={{display:"flex",flexDirection:"column",gap:"8px",marginTop:"10px"}}>
            {[
              {s:sozlesmeOnay,fn:setSozlesmeOnay,tip:"kullanim",label:"Kullanım Koşulları ve Mesafeli Satış Sözleşmesini"},
              {s:kvkkOnay,fn:setKvkkOnay,tip:"kvkk",label:"KVKK Aydınlatma Metnini"},
            ].map(x=>(
              <label key={x.tip} style={{display:"flex",alignItems:"flex-start",gap:"10px",cursor:"pointer",padding:"9px 12px",borderRadius:"9px",border:"1px solid "+(x.s?"rgba(34,197,94,0.4)":"rgba(239,68,68,0.2)"),background:x.s?"rgba(34,197,94,0.05)":"rgba(239,68,68,0.03)"}}>
                <input type="checkbox" checked={x.s} onChange={e=>x.fn(e.target.checked)} style={{width:"15px",height:"15px",accentColor:"#22c55e",cursor:"pointer",flexShrink:0,marginTop:"2px"}}/>
                <span style={{fontSize:"12px",color:"#94a3b8"}}>
                  <span onClick={e=>{e.preventDefault();setYasal(x.tip);}} style={{color:"#60a5fa",textDecoration:"underline",cursor:"pointer"}}>{x.label}</span> okudum ve kabul ediyorum. *
                </span>
              </label>
            ))}
          </div>
          <button onClick={misafir} disabled={!sozlesmeOnay||!kvkkOnay} style={{...btnP,width:"100%",marginTop:"16px",boxShadow:"none",opacity:(!sozlesmeOnay||!kvkkOnay)?0.5:1}}>Misafir Olarak Devam →</button>
        </>)}
      </div>
    </div>
    {yasal&&<YasalModal tip={yasal} onClose={()=>setYasal(null)}/>}
  </>);
}

/* ══════════════════════════════════════════════
   KURYE DASHBOARD
══════════════════════════════════════════════ */
function KuryeDash({user,onLogout}){
  const[tab,setTab]=useState("bekleyen");
  const[siparisler,setSiparisler]=useState([]);
  const[aktifSiparis,setAktifSiparis]=useState(null);
  const[loading,setLoading]=useState(true);
  const[teslimKoduInput,setTeslimKoduInput]=useState("");
  const[teslimHata,setTeslimHata]=useState("");
  const[stats,setStats]=useState({toplamTeslimat:0,buAyKazanc:0,toplamKazanc:0,puan:0});

  useEffect(()=>{
    yukle();
    // Her 15 sn yenile
    const interval=setInterval(yukle,15000);
    return()=>clearInterval(interval);
  },[]);

  const yukle=async()=>{
    try{
      // Bekleyen siparişler
      const{data:bek}=await sb.from("teslimatlar").select("*").eq("durum","bekliyor").order("created_at",{ascending:false});
      // Kurye'nin aktif siparişi
      const{data:{user:u}}=await sb.auth.getUser();
      const{data:akt}=await sb.from("teslimatlar").select("*").eq("kurye_id",u.id).in("durum",["kabul_edildi","yolda"]).maybeSingle();
      // Tamamlanan siparişler
      const{data:tam}=await sb.from("teslimatlar").select("*").eq("kurye_id",u.id).eq("durum","tamamlandi");
      
      setSiparisler(bek||[]);
      setAktifSiparis(akt||null);
      
      // Stats hesapla
      const toplamT=tam?.length||0;
      const buAy=tam?.filter(t=>{
        const d=new Date(t.created_at);
        const now=new Date();
        return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      })||[];
      const buAyK=buAy.reduce((s,t)=>s+(t.fiyat*(1-0.30)),0);
      const toplamK=tam?.reduce((s,t)=>s+(t.fiyat*(1-0.30)),0)||0;
      // Sadakat ödülü: her 50 teslimatta ₺50
      const odul=Math.floor(toplamT/50)*50;
      setStats({toplamTeslimat:toplamT,buAyKazanc:Math.ceil(buAyK),toplamKazanc:Math.ceil(toplamK+odul),puan:4.8});
    }catch(e){
      console.log(e);
    }
    setLoading(false);
  };

  const kabul=async(siparis)=>{
    const{data:{user:u}}=await sb.auth.getUser();
    await sb.from("teslimatlar").update({
      kurye_id:u.id, durum:"kabul_edildi", kabul_zamani:new Date().toISOString()
    }).eq("id",siparis.id);
    setAktifSiparis({...siparis,kurye_id:u.id,durum:"kabul_edildi"});
    setSiparisler(s=>s.filter(x=>x.id!==siparis.id));
    setTab("aktif");
    // Google Maps - gönderici adresine git
    const adres=encodeURIComponent(siparis.gon_adres+", Türkiye");
    window.open("https://www.google.com/maps/dir/?api=1&destination="+adres+"&travelmode=driving","_blank");
  };

  const paketiAldim=async()=>{
    const kod=Math.floor(1000+Math.random()*9000).toString();
    await sb.from("teslimatlar").update({durum:"yolda",teslim_kodu:kod}).eq("id",aktifSiparis.id);
    setAktifSiparis({...aktifSiparis,durum:"yolda",teslim_kodu:kod});
    // Google Maps - alıcı adresine git
    const adres=encodeURIComponent(aktifSiparis.al_adres+", Türkiye");
    window.open("https://www.google.com/maps/dir/?api=1&destination="+adres+"&travelmode=driving","_blank");
    // SMS gönder
    const smsMesaj="MotoTeslim teslimat kodunuz: "+kod+" - Kuryeye bu kodu veriniz.";
    const smsOk = await smsSend(aktifSiparis.al_tel, smsMesaj);
    alert(smsOk ? "✓ Teslim kodu SMS ile gönderildi!" : "✓ Teslimat başladı! Kod: "+kod);
  };

  const teslimEt=async()=>{
    if(teslimKoduInput!==aktifSiparis.teslim_kodu){
      setTeslimHata("Kod hatalı! Lütfen tekrar deneyin.");
      return;
    }
    await sb.from("teslimatlar").update({durum:"tamamlandi",tamamlanma_zamani:new Date().toISOString()}).eq("id",aktifSiparis.id);
    const fiyat=aktifSiparis.fiyat||0;
    const yeniToplam=stats.toplamTeslimat+1;

    // Kurye verisini al
    const{data:kuryeData}=await sb.from("kuryeler").select("id,bakiye,ref_kod").eq("user_id",user.id).maybeSingle();
    const mevcutBakiye=parseFloat(kuryeData?.bakiye||0);
    const kurye_ref_kod=kuryeData?.ref_kod||"";

    // Prim hesapla - kuryeyi davet edenler
    let toplamPrim=0;
    const buAyBaslangic=new Date();buAyBaslangic.setDate(1);buAyBaslangic.setHours(0,0,0,0);
    if(kurye_ref_kod){
      const{data:refler}=await sb.from("referanslar").select("davetci_tel,katman").eq("davet_edilen_tel",kurye_ref_kod);
      if(refler&&refler.length>0){
        for(const ref of refler){
          const primOran=ref.katman===1?0.05:ref.katman===2?0.03:0.01;
          const primTutar=Math.ceil(fiyat*primOran);
          if(primTutar<=0)continue;
          toplamPrim+=primTutar;
          // Davetçi bu ay min 3 iş yapmış mı?
          const{data:davetciKurye}=await sb.from("kuryeler").select("id,bakiye").eq("ref_kod",ref.davetci_tel).maybeSingle();
          if(!davetciKurye)continue;
          const{data:aylikIsler}=await sb.from("teslimatlar").select("id").eq("kurye_id",davetciKurye.id).eq("durum","tamamlandi").gte("tamamlanma_zamani",buAyBaslangic.toISOString());
          if((aylikIsler?.length||0)>=3){
            // Şartı karşılıyor → davetçinin bakiyesine ekle
            const dBakiye=parseFloat(davetciKurye.bakiye||0);
            await sb.from("kuryeler").update({bakiye:dBakiye+primTutar}).eq("id",davetciKurye.id);
          }
          // Şartı karşılamıyorsa prim platformda kalır (hiçbir yere eklenmez)
        }
      }
    }

    // Kurye net kazancı: %70 - primler (primler kuryeden kesilir)
    const platformPay=Math.ceil(fiyat*0.30);
    const kazanc=fiyat-platformPay-toplamPrim;

    // Kurye bakiyesine ekle
    const odulKazandi=yeniToplam%50===0;
    const finalKazanc=kazanc+(odulKazandi?50:0);
    await sb.from("kuryeler").update({bakiye:mevcutBakiye+finalKazanc}).eq("user_id",user.id);

    // Müşteri referans primlerini hesapla (paketi gönderen müşteriyi davet edenlere)
    const musteriId=aktifSiparis.musteri_id;
    if(musteriId){
      const{data:musteriData}=await sb.from("musteriler").select("ref_kod,bakiye").eq("id",musteriId).maybeSingle();
      if(musteriData?.ref_kod){
        const{data:mRefler}=await sb.from("referanslar").select("davetci_tel,katman").eq("davet_edilen_tel",musteriData.ref_kod);
        if(mRefler&&mRefler.length>0){
          for(const ref of mRefler){
            const primOran=ref.katman===1?0.05:ref.katman===2?0.03:0.01;
            const primTutar=Math.ceil(fiyat*primOran);
            if(primTutar<=0)continue;
            // Davetçi kurye mi müşteri mi?
            const{data:dKurye}=await sb.from("kuryeler").select("id,bakiye").eq("ref_kod",ref.davetci_tel).maybeSingle();
            const{data:dMusteri}=await sb.from("musteriler").select("id,bakiye").eq("ref_kod",ref.davetci_tel).maybeSingle();
            const davetci=dKurye||dMusteri;
            const davetciTablo=dKurye?"kuryeler":"musteriler";
            if(!davetci)continue;
            // Min 3 iş kontrolü (kuryeyse)
            if(dKurye){
              const{data:ayIs}=await sb.from("teslimatlar").select("id").eq("kurye_id",dKurye.id).eq("durum","tamamlandi").gte("tamamlanma_zamani",buAyBaslangic.toISOString());
              if((ayIs?.length||0)<3)continue;
            }
            const dBakiye=parseFloat(davetci.bakiye||0);
            await sb.from(davetciTablo).update({bakiye:dBakiye+primTutar}).eq("id",davetci.id);
          }
        }
      }
    }

    setAktifSiparis(null);
    setTeslimKoduInput("");
    setTeslimHata("");
    setTab("bekleyen");
    yukle();
    if(odulKazandi){
      alert("🎉 Tebrikler! 50 teslimat tamamladın! ₺50 sadakat ödülü dahil ₺"+finalKazanc+" bakiyene eklendi!");
    }else{
      alert("✓ Teslimat tamamlandı! ₺"+kazanc+" bakiyene eklendi!");
    }
  };

  const sonrakiOdul=50-(stats.toplamTeslimat%50);

  return(
    <div style={{maxWidth:"880px",margin:"0 auto",padding:"24px 20px"}}>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:"12px",marginBottom:"20px"}}>

          <div key={x.l} style={{background:C.card,border:"1px solid "+C.border,borderRadius:"13px",padding:"16px"}}>

          <div style={{fontSize:"13px",fontWeight:"700"}}>🏆 Sadakat Ödülü</div>

        <div style={{background:"rgba(0,0,0,0.2)",borderRadius:"20px",height:"8px",marginBottom:"8px"}}>
          <div style={{background:"linear-gradient(90deg,"+C.accent+",#f26419)",borderRadius:"20px",height:"8px",width:((stats.toplamTeslimat%50)/50*100)+"%",transition:"width .5s"}}/>

        <div style={{fontSize:"11px",color:C.muted}}>
          {stats.toplamTeslimat%50===0&&stats.toplamTeslimat>0

            {aktifSiparis.durum==="kabul_edildi"?"🏍️ Gönderici Adresine Git":"📦 Alıcıya Teslim Et"}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px",fontSize:"12px"}}>
            <div style={{background:"rgba(232,80,10,0.1)",borderRadius:"10px",padding:"12px"}}>
              <div style={{color:C.accent,fontWeight:"700",marginBottom:"4px"}}>📤 GÖNDERİCİ</div>
              <div style={{fontWeight:"600"}}>{aktifSiparis.gon_ad}</div>
              <div style={{color:C.muted,marginTop:"2px"}}>{aktifSiparis.gon_tel}</div>
              <div style={{color:C.muted,marginTop:"2px"}}>{aktifSiparis.gon_adres}</div>
            </div>
            <div style={{background:"rgba(34,197,94,0.08)",borderRadius:"10px",padding:"12px"}}>
              <div style={{color:C.success,fontWeight:"700",marginBottom:"4px"}}>📥 ALICI</div>
              <div style={{fontWeight:"600"}}>{aktifSiparis.al_ad}</div>
              <div style={{color:C.muted,marginTop:"2px"}}>{aktifSiparis.al_tel}</div>

            </div>
          </div>
          <div style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"14px",fontSize:"12px"}}>

            <span style={{background:"rgba(30,58,96,0.3)",border:"1px solid "+C.border,borderRadius:"8px",padding:"4px 10px",color:C.muted}}>{aktifSiparis.mesafe||"—"} km</span>
            <span style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:"8px",padding:"4px 10px",color:C.success,fontWeight:"700"}}>₺{Math.ceil((aktifSiparis.fiyat||0)*0.70)} kazanç</span>
          </div>

          {aktifSiparis.durum==="kabul_edildi"&&(
            <div style={{display:"flex",gap:"10px"}}>
              <button onClick={()=>{
                const adres=encodeURIComponent(aktifSiparis.gon_adres+", Türkiye");
                window.open("https://www.google.com/maps/dir/?api=1&destination="+adres+"&travelmode=driving","_blank");
              }} style={{...btnS,flex:1,fontSize:"13px",padding:"10px"}}>🗺️ Haritayı Aç</button>
              <button onClick={paketiAldim} style={{...btnP,flex:1,fontSize:"13px",padding:"10px",boxShadow:"none"}}>📦 Paketi Aldım</button>

            <div>
              <div style={{background:"rgba(34,197,94,0.05)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:"10px",padding:"12px",marginBottom:"12px",fontSize:"12px",color:C.success}}>

              </div>

                <input value={teslimKoduInput} onChange={e=>setTeslimKoduInput(e.target.value)}

                  style={{flex:1,padding:"12px",borderRadius:"9px",border:"1px solid "+C.inBorder,background:C.inBg,color:C.text,fontSize:"18px",fontWeight:"800",textAlign:"center",letterSpacing:"8px",outline:"none"}}/>

                  const adres=encodeURIComponent(aktifSiparis.al_adres+", Türkiye");
                  window.open("https://www.google.com/maps/dir/?api=1&destination="+adres+"&travelmode=driving","_blank");
                }} style={{...btnS,fontSize:"12px",padding:"12px 14px"}}>🗺️ Harita</button>
              </div>
              {teslimHata&&<div style={{color:C.error,fontSize:"11px",marginBottom:"8px"}}>⚠️ {teslimHata}</div>}

            </div>
          )}
        </div>
      )}

      {/* Tabs */}

          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:"8px",borderRadius:"7px",border:"none",background:tab===v?C.accent:"transparent",color:tab===v?"#fff":C.muted,fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>{l}</button>

      </div>

      {/* Bekleyen siparişler */}

          {loading&&<div style={{textAlign:"center",color:C.muted,padding:"40px",fontSize:"13px"}}>⏳ Yükleniyor...</div>}

            </div>
          )}
          {!loading&&aktifSiparis&&siparisler.length===0&&(
            <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"13px",padding:"20px",textAlign:"center",color:C.muted,fontSize:"13px"}}>
              Aktif teslimatın devam ediyor. Yeni sipariş almak için mevcut teslimatı tamamla.
            </div>
          )}
          {siparisler.map(s=>(
            <div key={s.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:"13px",padding:"16px",marginBottom:"12px"}} className="fade">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
                <div style={{fontSize:"11px",color:C.dim}}>#{s.id.slice(-6).toUpperCase()}</div>
                <div style={{fontSize:"13px",fontWeight:"800",color:C.success}}>₺{Math.ceil((s.fiyat||0)*0.70)}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",fontSize:"12px",marginBottom:"12px"}}>
                <div>
                  <div style={{color:C.accent,fontWeight:"700",fontSize:"10px",marginBottom:"3px"}}>📤 GÖNDERİCİ</div>
                  <div style={{fontWeight:"600"}}>{s.gon_ad}</div>
                  <div style={{color:C.muted,fontSize:"11px"}}>{s.gon_adres}</div>
                </div>
                <div>
                  <div style={{color:C.success,fontWeight:"700",fontSize:"10px",marginBottom:"3px"}}>📥 ALICI</div>
                  <div style={{fontWeight:"600"}}>{s.al_ad}</div>
                  <div style={{color:C.muted,fontSize:"11px"}}>{s.al_adres}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px"}}>
                <span style={{fontSize:"11px",background:C.accentGlow,border:"1px solid "+C.accent,borderRadius:"6px",padding:"3px 8px",color:C.accent,fontWeight:"700"}}>{s.agirlik} kg</span>
                <span style={{fontSize:"11px",background:"rgba(30,58,96,0.3)",border:"1px solid "+C.border,borderRadius:"6px",padding:"3px 8px",color:C.muted}}>{s.mesafe||"—"} km</span>
                <span style={{fontSize:"11px",color:C.dim,marginLeft:"auto"}}>{new Date(s.created_at).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})}</span>
              </div>
              <button onClick={()=>kabul(s)} disabled={!!aktifSiparis}
                style={{...btnP,width:"100%",boxShadow:"none",fontSize:"13px",padding:"10px",opacity:aktifSiparis?0.4:1,cursor:aktifSiparis?"not-allowed":"pointer"}}>
                {aktifSiparis?"Önce aktif teslimatı tamamla":"✓ Kabul Et"}
              </button>
            </div>
          ))}
        </div>
      )}

      {/* Geçmiş */}
      {tab==="gecmis"&&(
        <GecmisTeslimatlar userId={user.id}/>
      )}
    </div>
  );
}

function GecmisTeslimatlar({userId}){
  const[liste,setListe]=useState([]);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    const yukle=async()=>{
      const{data:{user:u}}=await sb.auth.getUser();
      const{data}=await sb.from("teslimatlar").select("*").eq("kurye_id",u.id).eq("durum","tamamlandi").order("created_at",{ascending:false}).limit(20);
      setListe(data||[]);
      setLoading(false);
    };
    yukle();
  },[]);
  if(loading)return <div style={{textAlign:"center",color:C.muted,padding:"30px",fontSize:"13px"}}>⏳ Yükleniyor...</div>;
  if(liste.length===0)return <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"13px",padding:"40px",textAlign:"center",color:C.muted,fontSize:"13px"}}>Henüz tamamlanan teslimat yok.</div>;
  return(
    <div>
      {liste.map(s=>(
        <div key={s.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:"12px",padding:"14px",marginBottom:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:"12px",fontWeight:"600"}}>{s.gon_adres}</div>
            <div style={{fontSize:"11px",color:C.muted,marginTop:"2px"}}>→ {s.al_adres}</div>
            <div style={{fontSize:"10px",color:C.dim,marginTop:"3px"}}>{new Date(s.created_at).toLocaleDateString("tr-TR")}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"15px",fontWeight:"800",color:C.success}}>₺{Math.ceil((s.fiyat||0)*0.70)}</div>
            <div style={{fontSize:"10px",color:C.dim,marginTop:"2px"}}>{s.agirlik} kg · {s.mesafe||"—"} km</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function YasalModal({tip,onClose}){

    iade:{icon:"↩️",baslik:"İade & İptal Politikası"},
    hakkimizda:{icon:"🏢",baslik:"Hakkımızda"},
    misyon:{icon:"🎯",baslik:"Misyonumuz"},
  };
  const info=basliklar[tip]||{icon:"📄",baslik:"Yasal Metin"};

          <button onClick={onClose} style={{background:"none",border:"none",color:"#94a3b8",fontSize:"24px",cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{overflowY:"auto",padding:"24px",flex:1}}>
          {loading
            ?<div style={{textAlign:"center",color:"#475569",padding:"40px"}}>⏳ Yükleniyor...</div>
            :<div style={{fontSize:"13px",color:"#94a3b8",lineHeight:"1.9",whiteSpace:"pre-wrap"}}>{metin}</div>
          }
