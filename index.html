            ))}
            {msg.text&&<div style={{padding:"10px 12px",borderRadius:"8px",marginBottom:"12px",fontSize:"12px",fontWeight:"600",background:msg.type==="success"?"rgba(34,197,94,0.15)":"rgba(239,68,68,0.15)",color:msg.type==="success"?"#22c55e":"#ef4444"}}>{msg.text}</div>}
            <button onClick={gonder} disabled={yukleniyor} style={{width:"100%",padding:"13px",borderRadius:"12px",border:"none",background:"linear-gradient(135deg,#e8500a,#c44008)",color:"#fff",fontWeight:"800",fontSize:"14px",cursor:"pointer",opacity:yukleniyor?0.7:1}}>
              {yukleniyor?"⏳ Gönderiliyor...":"📨 Gönder"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function AdminPanel(){
  const[giris,setGiris]=useState(false);
  const[sifre,setSifre]=useState("");
  const[hata,setHata]=useState("");
  const[tab,setTab]=useState("istatistik");
  const[data,setData]=useState({siparisler:[],kuryeler:[],musteriler:[]});
  const[loading,setLoading]=useState(true);
  const[onaySistemi,setOnaySistemi]=useState(false);
  const[onayYukleniyor,setOnayYukleniyor]=useState(false);
  const[aramaMetni,setAramaMetni]=useState("");
  const[aramaTipi,setAramaTipi]=useState("hepsi");
  const[aramaStok,setAramaStok]=useState(null);
  const[seciliKisi,setSeciliKisi]=useState(null);
  const[detayYukleniyor,setDetayYukleniyor]=useState(false);
  const[odemeModal,setOdemeModal]=useState(false);
  const[odemeTutar,setOdemeTutar]=useState("");
  const[odemeNot,setOdemeNot]=useState("");
  const[odemeYukleniyor,setOdemeYukleniyor]=useState(false);
  const[odemeMsg,setOdemeMsg]=useState({type:"",msg:""});
  const[ayarlar,setAyarlar]=useState({
    moto_acilis:70,moto_100m:2,moto_sabit:90,
    oto_acilis:90,oto_100m:5,
    kamy_acilis:750,kamy_100m_kisa:22,kamy_km_uzun:23,kamy_sinir:10,
    kamyon_acilis:1500,kamyon_100m_kisa:35,kamyon_km_uzun:45,kamyon_sinir:10,
    ceza_moto:50,ceza_oto:50,ceza_kamy:250,ceza_kamyon:1500,
    ceza_gelmeme_dk:15,ceza_teslimat_dk:60,
    yakit_tazminat:30,komisyon:30,
    ref_kat1:5,ref_kat2:3,ref_kat3:1,ref_min_is:3,
    moto_max_kg:15,oto_max_kg:250,kamy_max_kg:3000,kamyon_max_kg:27000,
  });
  const[ayarKayd,setAyarKayd]=useState(false);
  const[talepler,setTalepler]=useState([]);
  const[seciliTalep,setSeciliTalep]=useState(null);
  const[talepYanit,setTalepYanit]=useState("");
  const[talepMsg,setTalepMsg]=useState("");
  const[silModal,setSilModal]=useState(false);
  const[sifreModal,setSifreModal]=useState(false);
  const[yeniSifre,setYeniSifre]=useState("");
  const[adminIslemMsg,setAdminIslemMsg]=useState({type:"",msg:""});
  const[adminIslemYukleniyor,setAdminIslemYukleniyor]=useState(false);

  useEffect(()=>{
    const s=sessionStorage.getItem("admin_giris");
    if(s==="1")setGiris(true);
  },[]);

  useEffect(()=>{
    if(giris){yukle();yukleOnayAyari();}
  },[giris]);

  const yukleOnayAyari=async()=>{
    const{data:tumAyarlar}=await sb.from("ayarlar").select("id,deger");
    if(tumAyarlar){
      const onay=tumAyarlar.find(a=>a.id==="onay_sistemi");
      setOnaySistemi(onay?.deger==="true");
      const obj={};
      tumAyarlar.forEach(a=>{const v=parseFloat(a.deger);obj[a.id]=isNaN(v)?a.deger:v;});
      setAyarlar(prev=>({...prev,...obj}));
    }
  };

  const kisiyiSil=async()=>{
    if(!seciliKisi)return;
    setAdminIslemYukleniyor(true);setAdminIslemMsg({type:"",msg:""});
    try{
      const tablo=seciliKisi.tip==="kurye"?"kuryeler":"musteriler";
      const res=await fetch("/api/admin",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({islem:"sil_kullanici",user_id:seciliKisi.data.user_id,tablo,id:seciliKisi.data.id})});
      const d=await res.json();
      if(d.ok){
        setAdminIslemMsg({type:"success",msg:"✅ Kişi silindi!"});
        yukle();
        setTimeout(()=>{setSilModal(false);setSeciliKisi(null);setAdminIslemMsg({type:"",msg:""});},1500);
      }else{setAdminIslemMsg({type:"error",msg:"Hata: "+d.error});}
    }catch(e){setAdminIslemMsg({type:"error",msg:"Hata: "+e.message});}
    setAdminIslemYukleniyor(false);
  };

  const sifreDegistir=async()=>{
    if(!seciliKisi||!yeniSifre)return;
    if(yeniSifre.length<6){setAdminIslemMsg({type:"error",msg:"Şifre en az 6 karakter olmalı!"});return;}
    setAdminIslemYukleniyor(true);setAdminIslemMsg({type:"",msg:""});
    try{
      const res=await fetch("/api/admin",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({islem:"sifre_degistir",user_id:seciliKisi.data.user_id,yeni_sifre:yeniSifre})});
      const d=await res.json();
      if(d.ok){
        setAdminIslemMsg({type:"success",msg:"✅ Şifre değiştirildi!"});
        setTimeout(()=>{setSifreModal(false);setYeniSifre("");setAdminIslemMsg({type:"",msg:""});},1500);
      }else{setAdminIslemMsg({type:"error",msg:"Hata: "+d.error});}
    }catch(e){setAdminIslemMsg({type:"error",msg:"Hata: "+e.message});}
    setAdminIslemYukleniyor(false);
  };

  const ayarKaydet=async()=>{
    setAyarKayd(true);
    const rows=Object.entries(ayarlar).map(([id,deger])=>({id,deger:String(deger),guncelleme:new Date().toISOString()}));
    await sb.from("ayarlar").upsert(rows);
    setTimeout(()=>setAyarKayd(false),2000);
  };

  const setAyar=k=>e=>setAyarlar(prev=>({...prev,[k]:parseFloat(e.target.value)||0}));

  const detayAc=async(tip,kisi)=>{
    setDetayYukleniyor(true);setSeciliKisi({tip,data:kisi,siparisler:[],referanslar:[]});
    let siparisler=[];
    if(tip==="kurye"){
      const{data:s}=await sb.from("teslimatlar").select("*").eq("kurye_id",kisi.id).order("created_at",{ascending:false});
      siparisler=s||[];
    } else {
      const{data:s}=await sb.from("teslimatlar").select("*").eq("musteri_id",kisi.id).order("created_at",{ascending:false});
      siparisler=s||[];
    }
    // Davet ettikleri
    const tablo=tip==="kurye"?"kuryeler":"musteriler";
    const refKod=kisi.tel?(kisi.tel+"").replace(/[^0-9]/g,"").replace(/^0/,""):"";
    const{data:davetilenler}=await sb.from(tablo).select("ad,soyad,tel,created_at").eq("davetci_kod",refKod);
    // Referans kazançları hesapla
    let refKazanc={kat1:0,kat2:0,kat3:0,toplam:0};
    if(tip==="kurye"){
      const kRef=kisi.ref_kod||(kisi.tel||"").replace(/[^0-9]/g,"").replace(/^0/,"");
      const{data:refTeslimatlar}=await sb.from("referanslar").select("katman,davet_edilen_tel").eq("davetci_tel",kRef);
      if(refTeslimatlar&&refTeslimatlar.length>0){
        for(const r of refTeslimatlar){
          const{data:rKurye}=await sb.from("kuryeler").select("id").eq("ref_kod",r.davet_edilen_tel).maybeSingle();
          if(!rKurye)continue;
          const{data:rSip}=await sb.from("teslimatlar").select("fiyat").eq("kurye_id",rKurye.id).eq("durum","tamamlandi");
          const topFiyat=(rSip||[]).reduce((t,s)=>t+(s.fiyat||0),0);
          const oran=r.katman===1?0.05:r.katman===2?0.03:0.01;
          const kazanc=Math.ceil(topFiyat*oran);
          if(r.katman===1)refKazanc.kat1+=kazanc;
          else if(r.katman===2)refKazanc.kat2+=kazanc;
          else refKazanc.kat3+=kazanc;
        }
        refKazanc.toplam=refKazanc.kat1+refKazanc.kat2+refKazanc.kat3;
      }
    }
    setSeciliKisi({tip,data:kisi,siparisler,davetilenler:davetilenler||[],refKazanc});
    setDetayYukleniyor(false);
  };

  const odemeYap=async()=>{
    const tutar=parseFloat(odemeTutar);
    if(!tutar||tutar<=0){setOdemeMsg({type:"error",msg:"Geçerli bir tutar girin."});return;}
    if(!seciliKisi||seciliKisi.tip!=="kurye"){return;}
    setOdemeYukleniyor(true);setOdemeMsg({type:"",msg:""});
    try{
      const kurye=seciliKisi.data;
      const mevcutBakiye=parseFloat(kurye.bakiye||0);
      const yeniBakiye=mevcutBakiye-tutar;
      await sb.from("kuryeler").update({bakiye:yeniBakiye}).eq("id",kurye.id);
      // Ödeme kaydı
      await sb.from("odemeler").insert({
        kurye_id:kurye.id,
        tutar:tutar,
        not:odemeNot||"Manuel ödeme",
        onceki_bakiye:mevcutBakiye,
        sonraki_bakiye:yeniBakiye,
        tarih:new Date().toISOString()
      });
      // SMS gönder
      await smsSend(kurye.tel,"Merhaba "+kurye.ad+", hesabiniza "+tutar+" TL odeme yapildi. Guncel bakiyeniz: "+Math.max(0,yeniBakiye)+" TL. MotoTeslim");
      setOdemeMsg({type:"success",msg:"✅ ₺"+tutar+" ödeme yapıldı, SMS gönderildi!"});
      setOdemeTutar("");setOdemeNot("");
      // Detayı yenile
      await detayAc("kurye",{...kurye,bakiye:yeniBakiye});
      setTimeout(()=>{setOdemeModal(false);setOdemeMsg({type:"",msg:""}); },2000);
    }catch(e){
      setOdemeMsg({type:"error",msg:"Hata: "+e.message});
    }
    setOdemeYukleniyor(false);
  };

  const toggleOnaySistemi=async()=>{
    setOnayYukleniyor(true);
    const yeni=!onaySistemi;
    await sb.from("ayarlar").upsert({id:"onay_sistemi",deger:String(yeni),guncelleme:new Date().toISOString()});
    setOnaySistemi(yeni);
    setOnayYukleniyor(false);
  };

  const yukle=async()=>{
    setLoading(true);
    const[{data:sip},{data:kur},{data:mus},{data:tal}]=await Promise.all([
      sb.from("teslimatlar").select("*").order("created_at",{ascending:false}),
      sb.from("kuryeler").select("*").order("created_at",{ascending:false}),
      sb.from("musteriler").select("*").order("created_at",{ascending:false}),
      sb.from("talepler").select("*").order("created_at",{ascending:false}),
    ]);
    setData({siparisler:sip||[],kuryeler:kur||[],musteriler:mus||[]});
    setTalepler(tal||[]);
    setLoading(false);
  };

  const girisYap=()=>{
    if(sifre===ADMIN_SIFRE){
      sessionStorage.setItem("admin_giris","1");
      setGiris(true);setHata("");
    }else{setHata("Şifre hatalı!");}
  };

  const siparisDurumDegistir=async(id,durum)=>{
    await sb.from("teslimatlar").update({durum}).eq("id",id);
    yukle();
  };

  const kurye_durumDegistir=async(id,durum)=>{
    await sb.from("kuryeler").update({durum}).eq("id",id);
    if(durum==="aktif"){
      const{data:k}=await sb.from("kuryeler").select("tel,ad").eq("id",id).maybeSingle();
      if(k?.tel) await smsSend(k.tel,"Merhaba "+k.ad+", MotoTeslim kurye basvurunuz onaylandi! Artik sisteme giris yapip siparis alabilirsiniz. mototeslim.com");
    }
    yukle();
  };

  // Arama fonksiyonu
  const aramaYap=()=>{
    const q=aramaMetni.toLowerCase().trim();
    if(!q){setAramaStok(null);return;}
    const sonuc={siparisler:[],kuryeler:[],musteriler:[]};

    if(aramaTipi==="hepsi"||aramaTipi==="siparis"){
      sonuc.siparisler=data.siparisler.filter(s=>
        (s.id||"").toLowerCase().includes(q)||
        (s.gon_ad||"").toLowerCase().includes(q)||
        (s.gon_tel||"").toLowerCase().includes(q)||
        (s.gon_adres||"").toLowerCase().includes(q)||
        (s.al_ad||"").toLowerCase().includes(q)||
        (s.al_tel||"").toLowerCase().includes(q)||
        (s.al_adres||"").toLowerCase().includes(q)
      );
    }
    if(aramaTipi==="hepsi"||aramaTipi==="kurye"){
      sonuc.kuryeler=data.kuryeler.filter(k=>
        (k.ad+" "+k.soyad).toLowerCase().includes(q)||
        (k.tel||"").toLowerCase().includes(q)||
        (k.plaka||"").toLowerCase().includes(q)||
        (k.arac_marka||"").toLowerCase().includes(q)||
        (k.arac_model||"").toLowerCase().includes(q)||
        (k.tc||"").toLowerCase().includes(q)
      );
    }
    if(aramaTipi==="hepsi"||aramaTipi==="musteri"){
      sonuc.musteriler=data.musteriler.filter(m=>
        (m.ad+" "+m.soyad).toLowerCase().includes(q)||
        (m.tel||"").toLowerCase().includes(q)||
        (m.adres||"").toLowerCase().includes(q)||
        (m.tc||"").toLowerCase().includes(q)
      );
    }
    setAramaStok(sonuc);
  };

  if(!giris)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{width:"100%",maxWidth:"360px",background:C.card,border:"1px solid "+C.border,borderRadius:"18px",padding:"32px"}} className="fade">
        <div style={{textAlign:"center",marginBottom:"24px"}}>
          <div style={{fontSize:"36px",marginBottom:"8px"}}>🔐</div>
          <div style={{fontSize:"20px",fontWeight:"800"}}>Admin Girişi</div>
          <div style={{fontSize:"12px",color:C.muted,marginTop:"4px"}}>MotoTeslim Yönetim Paneli</div>
        </div>
        <input type="password" placeholder="Admin şifresi" value={sifre}
          onChange={e=>setSifre(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&girisYap()}
          style={{width:"100%",padding:"12px 14px",borderRadius:"10px",border:"1px solid "+C.inBorder,background:C.inBg,color:C.text,fontSize:"14px",outline:"none",boxSizing:"border-box",marginBottom:"12px"}}/>
        {hata&&<div style={{color:C.error,fontSize:"12px",marginBottom:"10px"}}>⚠️ {hata}</div>}
        <button onClick={girisYap} style={{...btnP,width:"100%",boxShadow:"none"}}>Giriş Yap</button>
        <div style={{textAlign:"center",marginTop:"14px"}}>
          <a href="/" style={{fontSize:"12px",color:C.muted}}>← Ana sayfaya dön</a>
        </div>
      </div>
    </div>
  );

  // İstatistikler
  const tamam=data.siparisler.filter(s=>s.durum==="tamamlandi");
  const bekliyor=data.siparisler.filter(s=>s.durum==="bekliyor");
  const yolda=data.siparisler.filter(s=>s.durum==="yolda"||s.durum==="kabul_edildi");
  const toplamCiro=tamam.reduce((s,x)=>s+(x.fiyat||0),0);
  const toplamKomisyon=Math.ceil(toplamCiro*0.30);
  const bugun=new Date().toDateString();
  const bugunSip=tamam.filter(s=>new Date(s.created_at).toDateString()===bugun);
  const bugunCiro=bugunSip.reduce((s,x)=>s+(x.fiyat||0),0);

  const SiparisKart=({s})=>(
    <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"13px",padding:"16px",marginBottom:"12px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
        <div>
          <div style={{fontSize:"11px",color:C.dim}}>#{s.id.slice(-8).toUpperCase()}</div>
          <div style={{fontSize:"11px",color:C.muted,marginTop:"2px"}}>{new Date(s.created_at).toLocaleString("tr-TR")}</div>
        </div>
        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
          <span style={{fontSize:"11px",padding:"3px 8px",borderRadius:"6px",fontWeight:"700",background:s.durum==="tamamlandi"?"rgba(34,197,94,0.15)":s.durum==="bekliyor"?"rgba(245,158,11,0.15)":"rgba(59,130,246,0.15)",color:s.durum==="tamamlandi"?C.success:s.durum==="bekliyor"?"#f59e0b":"#3b82f6"}}>{s.durum}</span>
          <span style={{fontSize:"14px",fontWeight:"900",color:C.accent}}>₺{s.fiyat||0}</span>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",fontSize:"12px",marginBottom:"12px"}}>
        <div style={{background:"rgba(232,80,10,0.07)",borderRadius:"8px",padding:"10px"}}>
          <div style={{color:C.accent,fontWeight:"700",fontSize:"10px",marginBottom:"3px"}}>📤 GÖNDERİCİ</div>
          <div style={{fontWeight:"600"}}>{s.gon_ad}</div>
          <div style={{color:C.muted}}>{s.gon_tel}</div>
          <div style={{color:C.muted,fontSize:"11px"}}>{s.gon_adres}</div>
        </div>
        <div style={{background:"rgba(34,197,94,0.07)",borderRadius:"8px",padding:"10px"}}>
          <div style={{color:C.success,fontWeight:"700",fontSize:"10px",marginBottom:"3px"}}>📥 ALICI</div>
          <div style={{fontWeight:"600"}}>{s.al_ad}</div>
          <div style={{color:C.muted}}>{s.al_tel}</div>
          <div style={{color:C.muted,fontSize:"11px"}}>{s.al_adres}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
        <span style={{fontSize:"11px",background:C.accentGlow,border:"1px solid "+C.accent,borderRadius:"6px",padding:"3px 8px",color:C.accent}}>{s.agirlik||"—"} kg</span>
        <span style={{fontSize:"11px",background:"rgba(30,58,96,0.3)",border:"1px solid "+C.border,borderRadius:"6px",padding:"3px 8px",color:C.muted}}>{s.mesafe||"—"} km</span>
        <span style={{fontSize:"11px",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:"6px",padding:"3px 8px",color:C.success}}>Komisyon: ₺{Math.ceil((s.fiyat||0)*0.30)}</span>
        {s.durum!=="tamamlandi"&&s.durum!=="iptal"&&(
          <button onClick={()=>siparisDurumDegistir(s.id,"iptal")} style={{fontSize:"11px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"6px",padding:"3px 8px",color:C.error,cursor:"pointer",marginLeft:"auto"}}>✕ İptal Et</button>
        )}
      </div>
    </div>
  );

  const KuryeKart=({k})=>(
    <div onClick={()=>detayAc("kurye",k)} style={{background:C.card,border:"1px solid "+C.border,borderRadius:"13px",padding:"16px",marginBottom:"12px",cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:"14px",fontWeight:"700"}}>{k.ad} {k.soyad}</div>
          <div style={{fontSize:"12px",color:C.muted,marginTop:"3px"}}>{k.tel}</div>
          {k.tc&&<div style={{fontSize:"11px",color:C.dim,marginTop:"2px"}}>TC: {k.tc}</div>}
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"8px"}}>
            <span style={{fontSize:"11px",background:"rgba(30,58,96,0.3)",border:"1px solid "+C.border,borderRadius:"6px",padding:"3px 8px",color:C.muted}}>{k.arac_turu||"—"}</span>
            {k.arac_marka&&<span style={{fontSize:"11px",background:"rgba(30,58,96,0.3)",border:"1px solid "+C.border,borderRadius:"6px",padding:"3px 8px",color:C.muted}}>{k.arac_marka} {k.arac_model}</span>}
            {k.plaka&&<span style={{fontSize:"11px",background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.3)",borderRadius:"6px",padding:"3px 8px",color:"#3b82f6",fontWeight:"700"}}>🚗 {k.plaka}</span>}
            <span style={{fontSize:"11px",padding:"3px 8px",borderRadius:"6px",fontWeight:"700",background:k.durum==="aktif"?"rgba(34,197,94,0.15)":"rgba(245,158,11,0.15)",color:k.durum==="aktif"?C.success:"#f59e0b"}}>{k.durum||"beklemede"}</span>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"6px",marginLeft:"12px"}}>
          {k.durum!=="aktif"&&<button onClick={()=>kurye_durumDegistir(k.id,"aktif")} style={{fontSize:"11px",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:"7px",padding:"6px 12px",color:C.success,cursor:"pointer",fontWeight:"700"}}>✓ Onayla</button>}
          {k.durum==="aktif"&&<button onClick={()=>kurye_durumDegistir(k.id,"pasif")} style={{fontSize:"11px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"7px",padding:"6px 12px",color:C.error,cursor:"pointer",fontWeight:"700"}}>Askıya Al</button>}
          {k.durum==="pasif"&&<button onClick={()=>kurye_durumDegistir(k.id,"aktif")} style={{fontSize:"11px",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:"7px",padding:"6px 12px",color:C.success,cursor:"pointer",fontWeight:"700"}}>Aktifleştir</button>}
        </div>
      </div>
    </div>
  );

  const MusteriKart=({m})=>(
    <div onClick={()=>detayAc("musteri",m)} style={{background:C.card,border:"1px solid "+C.border,borderRadius:"13px",padding:"16px",marginBottom:"12px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>

            </div>

          <div style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:"10px",padding:"12px 16px",marginBottom:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:"12px",color:"#94a3b8"}}>Mevcut Bakiye</span>
            <span style={{fontSize:"18px",fontWeight:"900",color:"#22c55e"}}>₺{(seciliKisi.data.bakiye||0).toFixed(2)}</span>
          </div>

          <div style={{marginBottom:"14px"}}>
            <div style={{fontSize:"11px",color:"#94a3b8",fontWeight:"600",marginBottom:"6px"}}>Ödenecek Tutar (₺)</div>
            <input
              type="number"
              placeholder="Örn: 500"
              value={odemeTutar}
              onChange={e=>setOdemeTutar(e.target.value)}
              style={{width:"100%",padding:"12px 14px",borderRadius:"10px",border:"1px solid #1e3a5f",background:"#0f1929",color:"#f1f5f9",fontSize:"16px",outline:"none",boxSizing:"border-box",fontWeight:"700"}}
            />
          </div>

          <div style={{marginBottom:"16px"}}>
            <div style={{fontSize:"11px",color:"#94a3b8",fontWeight:"600",marginBottom:"6px"}}>Not (opsiyonel)</div>
            <input
              type="text"
              placeholder="Örn: Kasım ayı ödemesi"
              value={odemeNot}
              onChange={e=>setOdemeNot(e.target.value)}
              style={{width:"100%",padding:"10px 14px",borderRadius:"10px",border:"1px solid #1e3a5f",background:"#0f1929",color:"#f1f5f9",fontSize:"13px",outline:"none",boxSizing:"border-box"}}
            />
          </div>

          {odemeTutar&&parseFloat(odemeTutar)>0&&(
            <div style={{background:"rgba(232,80,10,0.1)",border:"1px solid rgba(232,80,10,0.3)",borderRadius:"10px",padding:"12px 16px",marginBottom:"14px",fontSize:"12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                <span style={{color:"#94a3b8"}}>Mevcut bakiye</span>
                <span style={{fontWeight:"700"}}>₺{(seciliKisi.data.bakiye||0).toFixed(2)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                <span style={{color:"#94a3b8"}}>Ödenen</span>
                <span style={{fontWeight:"700",color:"#e8500a"}}>- ₺{parseFloat(odemeTutar).toFixed(2)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #1e2d45",paddingTop:"6px",marginTop:"4px"}}>
                <span style={{color:"#94a3b8"}}>Kalan bakiye</span>
                <span style={{fontWeight:"900",color:"#22c55e"}}>₺{Math.max(0,(seciliKisi.data.bakiye||0)-parseFloat(odemeTutar)).toFixed(2)}</span>
              </div>
            </div>
          )}

          {odemeMsg.msg&&(
            <div style={{padding:"10px 14px",borderRadius:"8px",marginBottom:"14px",fontSize:"12px",fontWeight:"600",
              background:odemeMsg.type==="success"?"rgba(34,197,94,0.15)":"rgba(239,68,68,0.15)",
              color:odemeMsg.type==="success"?"#22c55e":"#ef4444",
              border:"1px solid "+(odemeMsg.type==="success"?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)")
            }}>{odemeMsg.msg}</div>
          )}

          <button onClick={odemeYap} disabled={odemeYukleniyor||!odemeTutar}
            style={{width:"100%",padding:"14px",borderRadius:"12px",border:"none",background:odemeYukleniyor||!odemeTutar?"#1e2d45":"#22c55e",color:odemeYukleniyor||!odemeTutar?"#475569":"#fff",fontWeight:"800",fontSize:"14px",cursor:odemeYukleniyor||!odemeTutar?"not-allowed":"pointer"}}>
            {odemeYukleniyor?"⏳ İşleniyor...":"💸 Ödemeyi Onayla"}
          </button>
        </div>
      </div>
    )}

    </div>
  );
}

function SifreDegistir(){
  const[sifre,setSifre]=useState("");
  const[sifre2,setSifre2]=useState("");
  const[loading,setLoading]=useState(false);
  const[alert,setAlert]=useState({type:"",msg:""});

  const kaydet=async()=>{
    if(!sifre||sifre.length<6){setAlert({type:"error",msg:"Şifre en az 6 karakter olmalı."});return;}
    if(sifre!==sifre2){setAlert({type:"error",msg:"Şifreler eşleşmiyor."});return;}
    setLoading(true);
    const{error}=await sb.auth.updateUser({password:sifre});
    if(error){setAlert({type:"error",msg:"Hata: "+error.message});}
    else{
      setAlert({type:"success",msg:"✓ Şifren güncellendi! Giriş sayfasına yönlendiriliyorsun..."});
      setTimeout(()=>{window.location.href=window.location.origin;},2500);
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{width:"100%",maxWidth:"400px",background:C.card,border:"1px solid "+C.border,borderRadius:"18px",padding:"32px"}} className="fade">
        <div style={{textAlign:"center",marginBottom:"24px"}}>
          <div style={{fontSize:"36px",marginBottom:"8px"}}>🔑</div>
          <div style={{fontSize:"20px",fontWeight:"800"}}>Yeni Şifre Belirle</div>
          <div style={{fontSize:"12px",color:C.muted,marginTop:"4px"}}>Hesabın için yeni bir şifre gir</div>
        </div>
        <Inp label="Yeni Şifre" type="password" placeholder="En az 6 karakter" value={sifre} onChange={e=>setSifre(e.target.value)}/>
        <Inp label="Şifre Tekrar" type="password" placeholder="Şifreni tekrar gir" value={sifre2} onChange={e=>setSifre2(e.target.value)}/>
        {alert.msg&&(
          <div style={{background:alert.type==="error"?"rgba(239,68,68,0.1)":"rgba(34,197,94,0.1)",border:"1px solid "+(alert.type==="error"?"rgba(239,68,68,0.3)":"rgba(34,197,94,0.3)"),borderRadius:"8px",padding:"10px 12px",fontSize:"12px",color:alert.type==="error"?C.error:C.success,margin:"12px 0"}}>
            {alert.msg}
          </div>
        )}
        <button onClick={kaydet} disabled={loading} style={{...btnP,width:"100%",boxShadow:"none",marginTop:"8px",opacity:loading?0.7:1}}>
          {loading?<span className="spin">⏳</span>:"Şifremi Güncelle"}
        </button>
      </div>
    </div>
  );
}

function App(){
  const[modal,setModal]=useState(null);
  const[user,setUser]=useState(null);
  const[ok,setOk]=useState(false);
  const[paketAc,setPaketAc]=useState(false);
  const[authChecked,setAuthChecked]=useState(false);
  const[sifreSifirla,setSifreSifirla]=useState(false);
  const[kariyer,setKariyer]=useState(null);
  const[kariyerMetin,setKariyerMetin]=useState("");

  useEffect(()=>{
    // Şifre sıfırlama linki ile gelindiyse
    sb.auth.onAuthStateChange((event)=>{
      if(event==="PASSWORD_RECOVERY"){setSifreSifirla(true);}
    });
    // Kariyer metni yükle
    sb.from("ayarlar").select("deger").eq("id","kariyer_metin").maybeSingle().then(({data})=>{
      if(data?.deger) setKariyerMetin(data.deger);
      else setKariyerMetin("MotoTeslim ile hem çalış hem kazan!\n\nSen de kurye olarak sisteme katıl, teslimat yap ve referanslarınla ekstra gelir elde et.\n\nDavet ettiğin her kurye veya müşterinin işlemlerinden otomatik prim kazan.");
    });
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){
        const meta=session.user.user_metadata;
        const rol=meta.rol==="kurye"?"kurye":"uye";
        let adres="",tel="";
        if(rol==="uye"){
          const{data:musteriData}=await sb.from("musteriler").select("*").eq("user_id",session.user.id).maybeSingle();
          adres=musteriData?.adres||meta.adres||"";
          tel=musteriData?.tel||meta.tel||"";
        }
        setUser({name:(meta.ad||"Kullanıcı")+" "+(meta.soyad||""),type:rol,adres,tel});
      }
      setAuthChecked(true);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(!session){setUser(null);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const logout=async()=>{await sb.auth.signOut();setUser(null);setOk(false);};

  if(sifreSifirla)return <SifreDegistir/>;
  if(window.location.pathname==='/admin'||window.location.search.includes('page=admin'))return <AdminPanel/>;
  if(!authChecked)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <img src={LOGO} alt="MotoTeslim" style={{height:"60px",objectFit:"contain",marginBottom:"20px"}}/>
        <div style={{color:C.muted,fontSize:"13px"}}>Yükleniyor...</div>
      </div>
    </div>
  );

  if(user&&user.type==="kurye"){
    return(<div style={{minHeight:"100vh",background:C.bg}}>
      <nav style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 32px",borderBottom:"1px solid "+C.border,background:"rgba(10,14,26,0.95)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:100}}>
        <img src={LOGO} alt="MotoTeslim" style={{height:"40px",objectFit:"contain"}}/>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <div style={{width:"30px",height:"30px",borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:"800"}}>{user.name[0]}</div>
          <span style={{fontSize:"13px",fontWeight:"600"}}>{user.name}</span>
          <button onClick={logout} style={{...btnS,fontSize:"12px",padding:"6px 12px"}}>Çıkış</button>
        </div>
      </nav>
      {ok&&<div style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:"10px",padding:"12px 18px",margin:"18px 32px 0",color:C.success,fontSize:"13px",fontWeight:"600"}}>✓ Kayıt başarılı! E-postanı doğruladıktan sonra tüm özelliklere erişebilirsin.</div>}
      <KuryeDash user={user} onLogout={logout}/>
    </div>);
  }

  if(user&&(user.type==="uye"||user.type==="misafir")){
    return(<div style={{minHeight:"100vh",background:C.bg}}>
      <nav style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 32px",borderBottom:"1px solid "+C.border,background:"rgba(10,14,26,0.95)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:100}}>
        <img src={LOGO} alt="MotoTeslim" style={{height:"40px",objectFit:"contain"}}/>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"13px",color:C.muted}}>👋 {user.name}</span>
          <button onClick={logout} style={{...btnS,fontSize:"12px",padding:"6px 12px"}}>Çıkış</button>
        </div>
      </nav>
      {paketAc
        ?<PaketGonder user={user} onClose={()=>setPaketAc(false)}/>

          <button onClick={()=>setPaketAc(true)} style={{...btnP,width:"100%",marginBottom:"12px"}}>📦 Paket Gönder</button>
          <button onClick={logout} style={{...btnS,width:"100%"}}>← Ana Sayfaya Dön</button>
        </div>

    </div>);

        <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
          <img src={LOGO} alt="MotoTeslim" style={{height:"40px",objectFit:"contain"}}/>

            🏆 Kariyer Planı
          </button>
        </div>
        <div>
          <button style={{padding:"8px 16px",borderRadius:"8px",cursor:"pointer",fontSize:"13px",fontWeight:"700",border:"1px solid "+C.border,background:"transparent",color:C.muted,marginLeft:"8px"}} onClick={()=>setModal("giris")}>Kurye Girişi</button>

      {modal==="yakinda"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={()=>setModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#111827",border:"1px solid #1e2d45",borderRadius:"20px",padding:"36px 28px",width:"100%",maxWidth:"400px",textAlign:"center"}} className="fade">
            <div style={{fontSize:"52px",marginBottom:"16px"}}>📱</div>
            <div style={{fontSize:"20px",fontWeight:"900",marginBottom:"10px"}}>Uygulama Çok Yakında!</div>
            <div style={{fontSize:"13px",color:"#94a3b8",lineHeight:"1.8",marginBottom:"24px"}}>
              MotoTeslim mobil uygulaması App Store ve Google Play'de yayınlanmak üzere geliştiriliyor.<br/><br/>
              Şu an web sitemizden tüm hizmetlere erişebilirsiniz. 🚀
            </div>
            <button onClick={()=>setModal(null)} style={{padding:"13px 32px",borderRadius:"12px",border:"none",background:"linear-gradient(135deg,#e8500a,#c44008)",color:"#fff",fontWeight:"800",fontSize:"14px",cursor:"pointer"}}>
              Tamam
            </button>
          </div>
        </div>
      )}

      {/* MODALlar */}
      {modal==="kayit"&&<KuryeKayit onClose={()=>setModal(null)} onSuccess={u=>{setUser(u);setModal(null);setOk(true);}}/>}
      {modal==="giris"&&<KuryeGiris onClose={()=>setModal(null)} onSuccess={u=>{setUser(u);setModal(null);}}/>}
      {modal==="gonder"&&<GondericiModal onClose={()=>setModal(null)} onSuccess={(u,acPaket)=>{setUser(u);setModal(null);if(acPaket)setPaketAc(true);}}/>}

      {/* 🏆 KARİYER PLANI MODALI */}
      {modal==="kariyer"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={()=>setModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:"1px solid "+C.border,borderRadius:"18px",padding:"28px",width:"100%",maxWidth:"560px",maxHeight:"85vh",overflowY:"auto"}} className="fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
              <div style={{fontSize:"17px",fontWeight:"800"}}>🏆 Kazandıkça Kazandıran Kariyer Planı</div>
              <button onClick={()=>setModal(null)} style={{background:"none",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}}>×</button>
            </div>
            <div style={{fontSize:"13px",color:"#94a3b8",lineHeight:"2",whiteSpace:"pre-wrap"}}>{kariyerMetin||"Yükleniyor..."}</div>
            <button onClick={()=>setModal(null)} style={{...btnP,width:"100%",marginTop:"20px",boxShadow:"none"}}>Tamam</button>
          </div>
        </div>
      )}

      {/* 📬 FOOTER MODALları (kimiz, iletisim, sikayet, oneri, sss) */}
      {["kimiz","iletisim","sikayet","oneri","sss"].includes(modal)&&(
        <FooterModal tip={modal} onClose={()=>setModal(null)}/>
      )}
      {["kullanim","kvkk","gizlilik","cerez","iade","hakkimizda","misyon"].includes(modal)&&(
        <YasalModal tip={modal} onClose={()=>setModal(null)}/>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
